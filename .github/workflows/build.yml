name: Build products and release

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+*']   # v0.1.18, v1.0.0-beta.1, etc.
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish artifacts and release"
        type: boolean
        default: false

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

# Add permissions needed for creating releases
permissions:
  contents: write

jobs:
  check-bugfix:
    name: Check for BUGFIX tag
    runs-on: ubuntu-latest
    outputs:
      spot: ${{ steps.check.outputs.spot }}
    steps:
      - name: Set spot instance preference
        id: check
        run: |
          # Always use spot instances (on-demand requires runs-on.com configuration)
          echo "spot=true" >> $GITHUB_OUTPUT

  determine-version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      is_release: ${{ steps.set-version.outputs.is_release }}
      is_prerelease: ${{ steps.set-version.outputs.is_prerelease }}
      tag_name: ${{ steps.set-version.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: set-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push: extract version from tag (v0.1.18 -> 0.1.18)
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"

            IS_RELEASE="true"

            # Detect pre-release suffix (anything with a hyphen after semver, e.g. 1.0.0-beta.1)
            if [[ "$VERSION" == *-* ]]; then
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi

            TAG_NAME="$TAG"

            echo "Tag push: version=$VERSION, tag=$TAG_NAME, prerelease=$IS_PRERELEASE"
          else
            # Main branch push or workflow_dispatch: timestamp version
            TIMESTAMP=$(date +'%Y.%m.%d-%H%M%S')

            if [ "$GITHUB_REF" == "refs/heads/main" ]; then
              VERSION="${TIMESTAMP}"
            else
              VERSION="${TIMESTAMP}-dev"
            fi

            IS_RELEASE="false"
            IS_PRERELEASE="true"
            TAG_NAME="$VERSION"

            echo "Branch push: version=$VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

  generate-protos:
    name: Generate Protocol Buffers
    needs: check-bugfix
    runs-on: runs-on=${{ github.run_id }}/runner=8cpu-linux-arm64/spot=${{ needs.check-bugfix.outputs.spot }}
    container: swift:6.2.3
    steps:
      - uses: actions/checkout@v4

      - name: Cache generated protos
        id: cache-protos
        uses: actions/cache@v5
        with:
          path: |
            Sources/WendyAgentGRPC/Proto/
            Sources/WendyCloudGRPC/Proto/
            Sources/ContainerdGRPC/Proto/
            Sources/ContainerdGRPCTypes/Proto/
            Sources/OpenTelemetryGRPC/Proto/
            Sources/OpenTelemetryGRPCTypes/Proto/
          key: protos-${{ hashFiles('Proto/**/*.proto', 'Scripts/Generate-Proto.sh') }}
          restore-keys: protos-

      - name: Generate protos
        if: steps.cache-protos.outputs.cache-hit != 'true'
        run: |
          chmod +x ./Scripts/Generate-Proto.sh
          ./Scripts/Generate-Proto.sh

      - name: Upload generated protos
        uses: actions/upload-artifact@v4
        with:
          name: generated-protos
          path: |
            Sources/WendyAgentGRPC/Proto/
            Sources/WendyCloudGRPC/Proto/
            Sources/ContainerdGRPC/Proto/
            Sources/ContainerdGRPCTypes/Proto/
            Sources/OpenTelemetryGRPC/Proto/
            Sources/OpenTelemetryGRPCTypes/Proto/
          retention-days: 1

  build-windows:
    name: wendy-cli-windows-amd64
    needs: [check-bugfix, determine-version]
    runs-on: runs-on=${{ github.run_id }}/image=windows25-full-x64/family=c7i/cpu=16/spot=false

    steps:
      - name: Setup Swift
        uses: compnerd/gha-setup-swift@main
        with:
          swift-version: swift-6.3-branch
          swift-build: 6.3-DEVELOPMENT-SNAPSHOT-2026-01-03-a
          update-sdk-modules: true

      - name: Checkout Wendy-Agent Repository
        uses: actions/checkout@v4
        with:
          path: wendy-agent

      - name: Checkout Custom AsyncHTTPClient
        uses: actions/checkout@v4
        with:
          repository: swift-server/async-http-client
          ref: jo/windows-support
          path: async-http-client

      - name: Checkout Custom Hummingbird
        uses: actions/checkout@v4
        with:
          repository: hummingbird-project/hummingbird
          ref: jo/windows-support
          path: hummingbird

      - name: Checkout Custom Rainbow
        uses: actions/checkout@v4
        with:
          repository: joannis/Rainbow
          ref: jo/windows
          path: Rainbow

      - name: Checkout Custom SwiftNIO
        uses: actions/checkout@v4
        with:
          repository: joannis/swift-nio
          ref: jo/winsock-fixes
          path: swift-nio

      - name: Checkout Custom SwiftNIO-SSL
        uses: actions/checkout@v4
        with:
          repository: joannis/swift-nio-ssl
          ref: jo/windows-support
          path: swift-nio-ssl

      - name: Checkout Custom SwiftNIO-Extras
        uses: actions/checkout@v4
        with:
          repository: joannis/swift-nio-extras
          ref: jo/windows-ucrt
          path: swift-nio-extras

      - name: Checkout Custom DNSClient
        uses: actions/checkout@v4
        with:
          repository: orlandos-nl/DNSClient
          ref: jo/windows-support
          path: DNSClient

      - name: Checkout Custom GRPC SwiftNIO Transport
        uses: actions/checkout@v4
        with:
          repository: joannis/grpc-swift-nio-transport
          ref: jo/windows-support
          path: grpc-swift-nio-transport

      - name: Install Visual Studio Build Tools (C++ workload)
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          $installer = "$env:TEMP\vs_BuildTools.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vs_BuildTools.exe" -OutFile $installer

          $args = @(
            "--quiet", "--wait", "--norestart", "--nocache",
            "--installPath", "C:\BuildTools",
            "--installChannelUri", "https://aka.ms/vs/17/release/channel",
            "--add", "Microsoft.VisualStudio.Workload.VCTools",
            "--includeRecommended"
          )

          $p = Start-Process -FilePath $installer -ArgumentList $args -PassThru -Wait
          "VS installer exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { throw "VS Build Tools install failed (exit code $($p.ExitCode))" }

      - name: Set up MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Provision Dependencies
        shell: pwsh
        run: |
          $VcpkgRoot = "C:\vcpkg"
          $ZlibDll = "$VcpkgRoot\installed\x64-windows\bin\zlib1.dll"

          if (-not (Test-Path $ZlibDll)) {
            Write-Host "Zlib not found. Installing via vcpkg..."
            & "$VcpkgRoot\vcpkg.exe" install zlib:x64-windows
          } else {
            Write-Host "Zlib found at $ZlibDll"
          }

      - name: Copy zlib.lib to z.lib
        shell: pwsh
        run: |
          Copy-Item "C:\vcpkg\installed\x64-windows\lib\zlib.lib" "C:\vcpkg\installed\x64-windows\lib\z.lib"

      - name: Inject Version
        shell: pwsh
        run: |
          cd ${{ github.workspace }}/wendy-agent
          $version = "${{ needs.determine-version.outputs.version }}"
          Write-Host "Using version: $version"
          & bash ./Scripts/inject-version.sh "$version"

      - name: Build wendy CLI (release)
        shell: pwsh
        run: |
          cd ${{ github.workspace }}/wendy-agent
          swift build -c release --arch x86_64 --product wendy --static-swift-stdlib -Xcc -I"C:\vcpkg\installed\x64-windows\include" -Xlinker -L"C:\vcpkg\installed\x64-windows\lib"

      - name: Create Distribution Bundle
        shell: pwsh
        run: |
          cd ${{ github.workspace }}/wendy-agent
          $BuildDir = (swift build --show-bin-path -c release --arch x86_64 --static-swift-stdlib | Select-Object -Last 1).Trim()
          Write-Host "Build directory: $BuildDir"
          cd ${{ github.workspace }}
          $StagingDir = "wendy-cli-windows-amd64"
          $ZlibSource = "C:\vcpkg\installed\x64-windows\bin\zlib1.dll"

          $SwiftBin = (Get-Command swift).Source | Split-Path
          $SwiftRuntime = Join-Path (Split-Path $SwiftBin) "bin"
          Write-Host "Swift runtime directory: $SwiftRuntime"

          if (Test-Path $StagingDir) { Remove-Item -Recurse -Force $StagingDir }
          New-Item -ItemType Directory -Path $StagingDir

          Copy-Item "$BuildDir\wendy.exe" -Destination "$StagingDir\"
          Copy-Item $ZlibSource -Destination "$StagingDir\"

          $SwiftDlls = @(
            "swift_Concurrency.dll",
            "swiftCore.dll",
            "Foundation.dll",
            "FoundationNetworking.dll",
            "FoundationXML.dll",
            "dispatch.dll",
            "BlocksRuntime.dll",
            "swiftWinSDK.dll",
            "swiftCRT.dll",
            "swiftDispatch.dll",
            "swiftDistributed.dll",
            "swiftObservation.dll",
            "swiftRegex.dll",
            "swiftSwiftOnoneSupport.dll",
            "swift_RegexParser.dll",
            "swift_StringProcessing.dll",
            "swiftSynchronization.dll"
          )

          foreach ($dll in $SwiftDlls) {
            $dllPath = Join-Path $SwiftRuntime $dll
            if (Test-Path $dllPath) {
              Write-Host "Copying $dll"
              Copy-Item $dllPath -Destination "$StagingDir\"
            } else {
              Write-Host "Warning: $dll not found at $dllPath"
            }
          }

          Write-Host "`nStaging directory contents:"
          Get-ChildItem $StagingDir

      - name: Create tarball
        shell: pwsh
        run: |
          $version = "${{ needs.determine-version.outputs.version }}"
          $tarballName = "wendy-cli-windows-amd64-$version.tar.gz"

          Write-Host "Working directory: $(Get-Location)"
          Write-Host "Directory listing:"
          Get-ChildItem

          if (-not (Test-Path "wendy-cli-windows-amd64")) {
            Write-Error "Staging directory wendy-cli-windows-amd64 does not exist!"
            exit 1
          }

          Write-Host "Contents of wendy-cli-windows-amd64:"
          Get-ChildItem wendy-cli-windows-amd64

          Write-Host "Creating tarball: $tarballName"
          tar.exe -czvf $tarballName "wendy-cli-windows-amd64"
          "tarball_name=$tarballName" >> $env:GITHUB_OUTPUT
        id: create-tarball

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-tarball.outputs.tarball_name }}
          path: ${{ steps.create-tarball.outputs.tarball_name }}
          retention-days: 14
          if-no-files-found: error

      - name: Build MSI Installer
        shell: pwsh
        run: |
          $version = "${{ needs.determine-version.outputs.version }}"
          $isRelease = "${{ needs.determine-version.outputs.is_release }}"

          if ($isRelease -eq "true") {
            # Semver release: use MAJOR.MINOR.PATCH directly (strip any pre-release suffix)
            $msiVersion = ($version -split '-')[0]
          } else {
            # Timestamp version: YYYY.MM.DD-HHMMSS -> YYYY.M.D (removing leading zeros)
            $parts = $version -split '-'
            $dateParts = $parts[0] -split '\.'
            $msiVersion = "$($dateParts[0]).$([int]$dateParts[1]).$([int]$dateParts[2])"
          }
          Write-Host "Full version: $version"
          Write-Host "MSI version: $msiVersion"

          # Install WiX v5
          dotnet tool install --global wix --version 5.0.2

          # Build MSI
          wix build `
            -d Version="$msiVersion" `
            -d SourceDir="wendy-cli-windows-amd64" `
            -arch x64 `
            -o "wendy-cli-windows-amd64-$version.msi" `
            wendy-agent/Scripts/windows/wendy.wxs

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wendy-cli-windows-amd64-${{ needs.determine-version.outputs.version }}.msi
          path: wendy-cli-windows-amd64-${{ needs.determine-version.outputs.version }}.msi
          retention-days: 14
          if-no-files-found: error

  build:
    needs: [check-bugfix, determine-version, generate-protos]
    strategy:
      matrix:
        include:
          - artifact-name: wendy-agent-linux-static-musl-aarch64
            runner: 8cpu-linux-arm64
            container: swift:6.2.3
            swift-sdk: aarch64-swift-linux-musl
            swift-sdk-url: https://download.swift.org/swift-6.2.3-release/static-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz
            swift-sdk-checksum: f30ec724d824ef43b5546e02ca06a8682dafab4b26a99fbb0e858c347e507a2c
            product: wendy-agent
          - artifact-name: wendy-agent-linux-static-musl-x86_64
            runner: 8cpu-linux-x64
            container: swift:6.2.3
            swift-sdk: x86_64-swift-linux-musl
            swift-sdk-url: https://download.swift.org/swift-6.2.3-release/static-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz
            swift-sdk-checksum: f30ec724d824ef43b5546e02ca06a8682dafab4b26a99fbb0e858c347e507a2c
            product: wendy-agent
          - artifact-name: wendy-cli-linux-static-musl-aarch64
            runner: 8cpu-linux-arm64
            container: swift:6.2.3
            swift-sdk: aarch64-swift-linux-musl
            swift-sdk-url: https://download.swift.org/swift-6.2.3-release/static-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz
            swift-sdk-checksum: f30ec724d824ef43b5546e02ca06a8682dafab4b26a99fbb0e858c347e507a2c
            product: wendy
          - artifact-name: wendy-cli-linux-static-musl-x86_64
            runner: 8cpu-linux-x64
            container: swift:6.2.3
            swift-sdk: x86_64-swift-linux-musl
            swift-sdk-url: https://download.swift.org/swift-6.2.3-release/static-sdk/swift-6.2.3-RELEASE/swift-6.2.3-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz
            swift-sdk-checksum: f30ec724d824ef43b5546e02ca06a8682dafab4b26a99fbb0e858c347e507a2c
            product: wendy
          - artifact-name: wendy-cli-macos-arm64
            runner: macos-26
            xcode-select: /Applications/Xcode_26.0.app
            product: wendy

    name: ${{ matrix.artifact-name }}
    runs-on: ${{ matrix.runner == 'macos-26' && 'macos-26' || format('runs-on={0}/runner={1}/spot={2}', github.run_id, matrix.runner, needs.check-bugfix.outputs.spot) }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@v4

      - name: Download generated protos
        uses: actions/download-artifact@v4
        with:
          name: generated-protos
          # Downloads to current directory, preserving Sources/ structure

      - name: Cache Swift SDK
        if: ${{ matrix.swift-sdk-url != '' }}
        uses: actions/cache@v5
        with:
          path: ~/.swiftpm/swift-sdks
          key: swift-sdk-${{ matrix.swift-sdk }}-${{ matrix.swift-sdk-checksum }}

      - name: Cache SPM dependencies
        uses: actions/cache@v5
        with:
          path: |
            .build/repositories
            .build/checkouts
          key: ${{ runner.os }}-${{ matrix.swift-sdk || 'native' }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.swift-sdk || 'native' }}-spm-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Static Linux SDK
        if: ${{ matrix.swift-sdk-url != '' }}
        run: |
          sdk_url="${{ matrix.swift-sdk-url }}"
          sdk_checksum="${{ matrix.swift-sdk-checksum }}"
          sdk_archive="${sdk_url##*/}"
          sdk_bundle="${sdk_archive%.tar.gz}"
          sdk_path="$HOME/.swiftpm/swift-sdks/$sdk_bundle"
          sdk_tmp="${RUNNER_TEMP:-/tmp}/$sdk_archive"

          if [ -d "$sdk_path" ]; then
            echo "Swift SDK already installed at $sdk_path"
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "Attempt $attempt of 3..."
            rm -rf "$sdk_path"
            if command -v curl >/dev/null 2>&1; then
              curl -L --fail --retry 5 --retry-delay 2 -o "$sdk_tmp" "$sdk_url"
              install_target="$sdk_tmp"
            else
              echo "curl not found; installing SDK directly from URL"
              install_target="$sdk_url"
            fi

            if swift sdk install "$install_target" --checksum "$sdk_checksum"; then
              echo "SDK installed successfully"
              exit 0
            fi
            echo "Attempt $attempt failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "All 3 attempts failed"
          exit 1
      - name: xcode-select
        if: ${{ matrix.xcode-select != '' }}
        run: |
          sudo xcode-select --switch ${{ matrix.xcode-select }}
      - name: Inject Version
        run: |
          # Use the version from the needs context
          echo "Using version: ${{ needs.determine-version.outputs.version }}"
          ./Scripts/inject-version.sh "${{ needs.determine-version.outputs.version }}"
      - name: Build
        shell: bash
        env:
          CC: "sccache clang"
          CXX: "sccache clang++"
        run: |
          args=(
            --configuration release
            --product "${{ matrix.product }}"
          )

          if [ -n "${{ matrix.swift-sdk }}" ]; then
            args+=(--swift-sdk "${{ matrix.swift-sdk }}")
          fi

          # Add optimization flags for wendy-agent builds
          if [ "${{ matrix.product }}" == "wendy-agent" ]; then
            args+=(-Xswiftc -whole-module-optimization)
            args+=(-Xlinker --gc-sections)
            args+=(-Xlinker --strip-all)
          fi

          # Use parallel compilation
          NCPU=$(nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 4)
          args+=(--jobs "$NCPU")

          swift build "${args[@]}"

          # Copy built binary to the output directory
          OUTPUT_DIR=${{ matrix.artifact-name }}
          BIN_PATH=$(swift build --show-bin-path "${args[@]}")
          mkdir $OUTPUT_DIR
          cp $BIN_PATH/${{ matrix.product }} $OUTPUT_DIR/

          # If a folder exists at $BIN_PATH/wendy-agent_${{ matrix.product }}.bundle, copy it to output/
          if [ -d "$BIN_PATH/wendy-agent_${{ matrix.product }}.bundle" ]; then
            cp -r $BIN_PATH/wendy-agent_${{ matrix.product }}.bundle $OUTPUT_DIR/
          fi
      - name: Import P12 Certificate
        if: ${{ matrix.artifact-name == 'wendy-cli-macos-arm64' }}
        uses: apple-actions/import-codesign-certs@v3
        with: 
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATES_FILE_BASE64 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATES_PASSWORD }}
          keychain: notary-keychain
      - name: Setup Notary Profile
        if: ${{ matrix.artifact-name == 'wendy-cli-macos-arm64' }}
        run: |
          xcrun notarytool store-credentials "notary-profile" \
            --apple-id "${{ secrets.NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.NOTARY_TEAM_ID }}" \
            --password "${{ secrets.NOTARY_PASSWORD }}"
      - name: Codesign
        if: ${{ matrix.artifact-name == 'wendy-cli-macos-arm64' }}
        timeout-minutes: 10
        run: |
          ./Scripts/codesign.sh "${{ matrix.artifact-name }}/${{ matrix.product }}"
      - name: Create tarball
        run: |
          TARBALL_NAME="${{ matrix.artifact-name }}-${{ needs.determine-version.outputs.version }}.tar.gz"
          tar -czvf "$TARBALL_NAME" ${{ matrix.artifact-name }}/
          echo "tarball_name=$TARBALL_NAME" >> $GITHUB_OUTPUT
        id: create-tarball
      - name: Upload binary artifact
        id: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create-tarball.outputs.tarball_name }}
          path: ${{ steps.create-tarball.outputs.tarball_name }}
          retention-days: 14
          if-no-files-found: error

  package-linux:
    name: Package Linux (${{ matrix.arch }})
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/spot=${{ needs.check-bugfix.outputs.spot }}
    needs: [check-bugfix, determine-version, build]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact-suffix: x86_64
            rpm-arch: x86_64
          - arch: arm64
            artifact-suffix: aarch64
            rpm-arch: aarch64
    steps:
      - name: Install FPM dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential rpm
          sudo gem install fpm

      - name: Download CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: wendy-cli-linux-static-musl-${{ matrix.artifact-suffix }}-${{ needs.determine-version.outputs.version }}.tar.gz

      - name: Download Agent artifact
        uses: actions/download-artifact@v4
        with:
          name: wendy-agent-linux-static-musl-${{ matrix.artifact-suffix }}-${{ needs.determine-version.outputs.version }}.tar.gz

      - name: Extract artifacts
        run: |
          ls -la
          tar -xzf wendy-cli-linux-static-musl-${{ matrix.artifact-suffix }}-${{ needs.determine-version.outputs.version }}.tar.gz
          tar -xzf wendy-agent-linux-static-musl-${{ matrix.artifact-suffix }}-${{ needs.determine-version.outputs.version }}.tar.gz
          ls -la

      - name: Build .deb packages
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"

          # Build wendy-cli .deb
          fpm -s dir -t deb \
            -n wendy \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Wendy CLI - Remote device debugging and deployment" \
            --url "https://wendy.sh" \
            --maintainer "Wendy Labs Inc. <support@wendy.sh>" \
            --license "Proprietary" \
            --vendor "Wendy Labs Inc." \
            --category "devel" \
            ./wendy-cli-linux-static-musl-${{ matrix.artifact-suffix }}/wendy=/usr/bin/wendy

          # Build wendy-agent .deb
          fpm -s dir -t deb \
            -n wendy-agent \
            -v "$VERSION" \
            --architecture ${{ matrix.arch }} \
            --description "Wendy Agent - Runs on target devices for remote debugging" \
            --url "https://wendy.sh" \
            --maintainer "Wendy Labs Inc. <support@wendy.sh>" \
            --license "Proprietary" \
            --vendor "Wendy Labs Inc." \
            --category "devel" \
            ./wendy-agent-linux-static-musl-${{ matrix.artifact-suffix }}/wendy-agent=/usr/bin/wendy-agent

          ls -la *.deb

      - name: Build .rpm packages
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          # RPM doesn't allow hyphens in version, replace with underscores
          RPM_VERSION=$(echo "$VERSION" | tr '-' '_')

          # Build wendy-cli .rpm
          fpm -s dir -t rpm \
            -n wendy \
            -v "$RPM_VERSION" \
            --architecture ${{ matrix.rpm-arch }} \
            --description "Wendy CLI - Remote device debugging and deployment" \
            --url "https://wendy.sh" \
            --maintainer "Wendy Labs Inc. <support@wendy.sh>" \
            --license "Proprietary" \
            --vendor "Wendy Labs Inc." \
            --category "Development/Tools" \
            ./wendy-cli-linux-static-musl-${{ matrix.artifact-suffix }}/wendy=/usr/bin/wendy

          # Build wendy-agent .rpm
          fpm -s dir -t rpm \
            -n wendy-agent \
            -v "$RPM_VERSION" \
            --architecture ${{ matrix.rpm-arch }} \
            --description "Wendy Agent - Runs on target devices for remote debugging" \
            --url "https://wendy.sh" \
            --maintainer "Wendy Labs Inc. <support@wendy.sh>" \
            --license "Proprietary" \
            --vendor "Wendy Labs Inc." \
            --category "Development/Tools" \
            ./wendy-agent-linux-static-musl-${{ matrix.artifact-suffix }}/wendy-agent=/usr/bin/wendy-agent

          ls -la *.rpm

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-deb-${{ matrix.arch }}
          path: "*.deb"
          retention-days: 14

      - name: Upload .rpm packages
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-rpm-${{ matrix.arch }}
          path: "*.rpm"
          retention-days: 14

  publish-linux-repos:
    name: Publish to GCP Artifact Registry
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/spot=${{ needs.check-bugfix.outputs.spot }}
    needs: [check-bugfix, determine-version, package-linux]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download all .deb packages
        uses: actions/download-artifact@v4
        with:
          pattern: linux-packages-deb-*
          merge-multiple: true
          path: packages/deb

      - name: Download all .rpm packages
        uses: actions/download-artifact@v4
        with:
          pattern: linux-packages-rpm-*
          merge-multiple: true
          path: packages/rpm

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload APT packages
        run: |
          echo "Uploading .deb packages to Artifact Registry..."
          for deb in packages/deb/*.deb; do
            echo "Uploading $deb"
            gcloud artifacts apt upload wendy-apt \
              --location=us-central1 \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --source="$deb"
          done

      - name: Upload YUM packages
        run: |
          echo "Uploading .rpm packages to Artifact Registry..."
          for rpm in packages/rpm/*.rpm; do
            echo "Uploading $rpm"
            gcloud artifacts yum upload wendy-yum \
              --location=us-central1 \
              --project=${{ vars.GCP_PROJECT_ID }} \
              --source="$rpm"
          done

  release:
    name: Release
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-arm64/spot=${{ needs.check-bugfix.outputs.spot }}
    needs: [check-bugfix, determine-version, build, build-windows, package-linux]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: List files
        run: |
          ls -la
          # Create a newline-delimited list of release files (tar.gz, deb, rpm, msi)
          {
            echo 'FILES<<EOF'
            find . -name "*.tar.gz" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" | sort
            echo 'EOF'
          } >> $GITHUB_ENV
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.determine-version.outputs.version }}
          tag_name: ${{ needs.determine-version.outputs.tag_name }}
          draft: false
          prerelease: ${{ needs.determine-version.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.determine-version.outputs.is_prerelease == 'false' }}
          files: ${{ env.FILES }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Update floating 'latest' tag for prereleases only (semver tags don't need it)
      - name: Checkout repo
        if: needs.determine-version.outputs.is_release != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Update 'latest' tag
        if: needs.determine-version.outputs.is_release != 'true'
        run: |
          set -euo pipefail
          git fetch origin --tags --force
          TAG='${{ needs.determine-version.outputs.tag_name }}'
          TARGET_SHA="$(git rev-list -n 1 "refs/tags/$TAG" || true)"
          if [ -z "$TARGET_SHA" ]; then TARGET_SHA="$GITHUB_SHA"; fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest "$TARGET_SHA" -m "Latest prerelease: $TAG"
          git push -f origin refs/tags/latest

      # Discord notification for stable releases
      - name: Notify Discord
        if: needs.determine-version.outputs.is_prerelease == 'false'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.determine-version.outputs.tag_name }}"
          REPO="${{ github.repository }}"
          URL="https://github.com/${REPO}/releases/tag/${VERSION}"

          # Fetch release body via gh CLI (safe from shell injection)
          BODY=$(gh release view "$VERSION" --repo "$REPO" --json body -q .body 2>/dev/null || echo "")
          BODY=$(echo "$BODY" | tr -d '\r')
          SHORT_BODY=$(echo "$BODY" | head -c 800)

          # Installation instructions
          read -r -d '' INSTALL_INSTRUCTIONS << 'INSTALL_EOF' || true
          ## Install the Wendy CLI

          **macOS (Homebrew)**
          ```
          brew install wendylabsinc/tap/wendy
          ```

          **Arch Linux (AUR)**
          ```
          yay -S wendy
          ```

          **Debian/Ubuntu (APT)**
          ```
          curl -fsSL https://wendylabsinc.github.io/wendy-agent/install-apt.sh | sudo bash
          ```

          **Fedora/RHEL (DNF/YUM)**
          ```
          curl -fsSL https://wendylabsinc.github.io/wendy-agent/install-yum.sh | sudo bash
          ```
          INSTALL_EOF

          FULL_DESCRIPTION="${SHORT_BODY}

          ${INSTALL_INSTRUCTIONS}"

          ESCAPED_DESC=$(echo "$FULL_DESCRIPTION" | jq -Rs .)

          cat > /tmp/discord_payload.json << PAYLOAD_EOF
          {
            "content": "🚀 **New CLI release**: **${VERSION}**",
            "embeds": [
              {
                "title": "Release ${VERSION}",
                "url": "${URL}",
                "description": ${ESCAPED_DESC},
                "color": 5814783,
                "footer": { "text": "${REPO} • ${VERSION}" }
              }
            ]
          }
          PAYLOAD_EOF

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            curl -sS -X POST -H "Content-Type: application/json" \
              -d @/tmp/discord_payload.json \
              "$DISCORD_WEBHOOK_URL" && echo "Discord notification sent" || echo "Discord notification failed"
          else
            echo "DISCORD_WEBHOOK_URL not configured, skipping notification"
          fi

      # Bump the formula in homebrew-tap
      - name: Create GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CLI_PUBLISHER_APP_ID }}
          private-key: ${{ secrets.CLI_PUBLISHER_APP_PRIVATE_KEY }}
          owner: wendylabsinc
          repositories: homebrew-tap

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: wendylabsinc/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          path: tap

      - name: Bump formula
        run: |
          set -euo pipefail
          cd tap
          VERSION="${{ needs.determine-version.outputs.version }}"
          TAG_NAME="${{ needs.determine-version.outputs.tag_name }}"
          BRANCH="ci/bump-wendy-${VERSION}"

          git checkout -b "$BRANCH"

          # Calculate URLs and SHA256s for pre-built binaries
          # Download URL uses tag_name (e.g. v0.1.18 or 2026.02.02-123456), artifact filename uses version
          MACOS_URL="https://github.com/wendylabsinc/wendy-agent/releases/download/${TAG_NAME}/wendy-cli-macos-arm64-${VERSION}.tar.gz"
          MACOS_SHA=$(curl -fsSL "$MACOS_URL" | sha256sum | awk '{print $1}')

          LINUX_ARM_URL="https://github.com/wendylabsinc/wendy-agent/releases/download/${TAG_NAME}/wendy-cli-linux-static-musl-aarch64-${VERSION}.tar.gz"
          LINUX_ARM_SHA=$(curl -fsSL "$LINUX_ARM_URL" | sha256sum | awk '{print $1}')

          LINUX_X86_URL="https://github.com/wendylabsinc/wendy-agent/releases/download/${TAG_NAME}/wendy-cli-linux-static-musl-x86_64-${VERSION}.tar.gz"
          LINUX_X86_SHA=$(curl -fsSL "$LINUX_X86_URL" | sha256sum | awk '{print $1}')

          echo "URLs and SHA256s:"
          echo "  macOS ARM64: ${MACOS_URL} -> ${MACOS_SHA}"
          echo "  Linux ARM64: ${LINUX_ARM_URL} -> ${LINUX_ARM_SHA}"
          echo "  Linux x86_64: ${LINUX_X86_URL} -> ${LINUX_X86_SHA}"

          # Update formula URLs and SHA256s (Linux sed syntax)
          sed -i "s|https://github.com/wendylabsinc/wendy-agent/releases/download/[^/]*/wendy-cli-macos-arm64[^\"]*|${MACOS_URL}|" Formula/wendy.rb
          sed -i "s|https://github.com/wendylabsinc/wendy-agent/releases/download/[^/]*/wendy-cli-linux-static-musl-aarch64[^\"]*|${LINUX_ARM_URL}|" Formula/wendy.rb
          sed -i "s|https://github.com/wendylabsinc/wendy-agent/releases/download/[^/]*/wendy-cli-linux-static-musl-x86_64[^\"]*|${LINUX_X86_URL}|" Formula/wendy.rb

          # Update SHA256s based on URL context (not sequential position)
          sed -i "/wendy-cli-macos-arm64.*tar\.gz/,/sha256/ s|sha256 \"[^\"]*\"|sha256 \"${MACOS_SHA}\"|" Formula/wendy.rb
          sed -i "/wendy-cli-linux-static-musl-aarch64.*tar\.gz/,/sha256/ s|sha256 \"[^\"]*\"|sha256 \"${LINUX_ARM_SHA}\"|" Formula/wendy.rb
          sed -i "/wendy-cli-linux-static-musl-x86_64.*tar\.gz/,/sha256/ s|sha256 \"[^\"]*\"|sha256 \"${LINUX_X86_SHA}\"|" Formula/wendy.rb

          echo "Updated formula:"
          grep -A 1 "url\|sha256" Formula/wendy.rb | head -20

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/wendy.rb
          git commit -m "wendy: bump to ${VERSION}"
          git push -u origin "$BRANCH"

      - name: Create PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          gh pr create \
            --repo wendylabsinc/homebrew-tap \
            --head "ci/bump-wendy-${VERSION}" \
            --base main \
            --title "wendy: bump to ${VERSION}" \
            --body "Automated bump from release ${VERSION}

          This PR updates the wendy formula to version ${VERSION}.

          All platforms use pre-built binaries (signed and notarized for macOS ARM64)."

  publish-aur:
    name: Publish AUR Packages
    runs-on: ubuntu-latest
    needs: [determine-version, release]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    strategy:
      matrix:
        include:
          - pkgname: wendy
            pkgbuild_path: packaging/arch/wendy/PKGBUILD
            x86_64_artifact: wendy-cli-linux-static-musl-x86_64
            aarch64_artifact: wendy-cli-linux-static-musl-aarch64
          - pkgname: wendy-agent
            pkgbuild_path: packaging/arch/wendy-agent/PKGBUILD
            x86_64_artifact: wendy-agent-linux-static-musl-x86_64
            aarch64_artifact: wendy-agent-linux-static-musl-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Calculate checksums from release
        id: checksums
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          TAG_NAME="${{ needs.determine-version.outputs.tag_name }}"

          # Download and calculate SHA256 for x86_64
          X86_64_URL="https://github.com/wendylabsinc/wendy-agent/releases/download/${TAG_NAME}/${{ matrix.x86_64_artifact }}-${VERSION}.tar.gz"
          echo "Downloading $X86_64_URL"
          X86_64_SHA=$(curl -fsSL "$X86_64_URL" | sha256sum | awk '{print $1}')
          echo "x86_64_sha=${X86_64_SHA}" >> $GITHUB_OUTPUT

          # Download and calculate SHA256 for aarch64
          AARCH64_URL="https://github.com/wendylabsinc/wendy-agent/releases/download/${TAG_NAME}/${{ matrix.aarch64_artifact }}-${VERSION}.tar.gz"
          echo "Downloading $AARCH64_URL"
          AARCH64_SHA=$(curl -fsSL "$AARCH64_URL" | sha256sum | awk '{print $1}')
          echo "aarch64_sha=${AARCH64_SHA}" >> $GITHUB_OUTPUT

          echo "Checksums:"
          echo "  x86_64:  ${X86_64_SHA}"
          echo "  aarch64: ${AARCH64_SHA}"

      - name: Update PKGBUILD
        run: |
          VERSION="${{ needs.determine-version.outputs.version }}"
          TAG_NAME="${{ needs.determine-version.outputs.tag_name }}"
          PKGBUILD="${{ matrix.pkgbuild_path }}"

          # Update version and tag
          sed -i "s/^_pkgver=.*/_pkgver=${VERSION}/" "$PKGBUILD"
          sed -i "s/^_pkgtag=.*/_pkgtag=${TAG_NAME}/" "$PKGBUILD"

          # Update checksums
          sed -i "s/sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.checksums.outputs.x86_64_sha }}')/" "$PKGBUILD"
          sed -i "s/sha256sums_aarch64=.*/sha256sums_aarch64=('${{ steps.checksums.outputs.aarch64_sha }}')/" "$PKGBUILD"

          echo "Updated PKGBUILD:"
          cat "$PKGBUILD"

      - name: Generate .SRCINFO
        uses: docker://archlinux:latest
        with:
          entrypoint: /bin/bash
          args: |
            -c "
            pacman -Sy --noconfirm base-devel shadow
            cd $(dirname ${{ matrix.pkgbuild_path }})
            if ! id -u builder >/dev/null 2>&1; then
              useradd -m builder
            fi
            chown -R builder:builder .
            su builder -s /bin/bash -c 'makepkg --printsrcinfo > .SRCINFO'
            cat .SRCINFO
            "

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3.0.1
        with:
          pkgname: ${{ matrix.pkgname }}
          pkgbuild: ${{ matrix.pkgbuild_path }}
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.determine-version.outputs.version }}"
