name: Build WendyOS Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.device }}
    permissions:
      contents: read
      id-token: write
    runs-on:
      - runs-on
      - family=c7i-flex.8xlarge
      - spot=false
      - volume=400gb:gp3
      - run-id=${{ github.run_id }}-${{ matrix.device }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: rpi3
            board: rpi3-sd
            machine: raspberrypi3-64-wendyos
            publisher_device: raspberry-pi-3
          - device: rpi4
            board: rpi4-sd
            machine: raspberrypi4-64-wendyos
            publisher_device: raspberry-pi-4
          - device: rpi5
            board: rpi5-sd
            machine: raspberrypi5-wendyos
            publisher_device: raspberry-pi-5
          - device: jetson
            board: jetson-orin-nano-nvme
            machine: jetson-orin-nano-devkit-nvme-wendyos
            publisher_device: jetson-orin-nano

    steps:
      # Disabled: build caching is flaky for mender builds
      # - name: Restore build cache
      #   uses: runs-on/snapshot@v1
      #   with:
      #     path: ${{ github.workspace }}
      #     volume_size: 500

      # - name: Restore Docker image cache
      #   uses: runs-on/snapshot@v1
      #   with:
      #     path: /var/lib/docker
      #     volume_size: 50

      - name: Fix workspace permissions
        run: sudo chown "$(id -u):$(id -g)" "$GITHUB_WORKSPACE"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos

      - name: Bootstrap build environment
        working-directory: ${{ github.workspace }}
        env:
          BOARD: ${{ matrix.board }}
        run: BOARD=$BOARD ./wendyos/bootstrap.sh

      - name: Fix workspace permissions for Docker
        run: chmod -R a+rwX "$GITHUB_WORKSPACE" 2>/dev/null || true

      - name: Build image
        working-directory: ${{ github.workspace }}/wendyos
        env:
          MACHINE: ${{ matrix.machine }}
        run: make build MACHINE=$MACHINE

      - name: Fix deploy directory permissions
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE/build/tmp/deploy" 2>/dev/null || true

      # --- Upload image and update device manifest (master manifest is handled by the publish job) ---

      - name: Authenticate to Google Cloud
        if: github.event_name != 'pull_request'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: github.event_name != 'pull_request'
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout publisher
        if: github.event_name != 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: wendylabsinc/wendy-os-publisher
          path: wendy-os-publisher

      - name: Set up Go
        if: github.event_name != 'pull_request'
        uses: actions/setup-go@v5
        with:
          go-version-file: wendy-os-publisher/go.mod

      - name: Install flashable image dependencies (Jetson only)
        if: github.event_name != 'pull_request' && matrix.device == 'jetson'
        run: sudo apt-get update && sudo apt-get install -y device-tree-compiler

      - name: Generate flashable image (Jetson only)
        if: github.event_name != 'pull_request' && matrix.device == 'jetson'
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ matrix.machine }}
          MACHINE: ${{ matrix.machine }}
        run: |
          TEGRAFLASH_FILE="$DEPLOY_DIR/wendyos-image-${MACHINE}.tegraflash.tar.gz"
          FLASH_WORKDIR="$GITHUB_WORKSPACE/flash-work"
          mkdir -p "$FLASH_WORKDIR"
          tar -xzf "$TEGRAFLASH_FILE" -C "$FLASH_WORKDIR"
          cd "$FLASH_WORKDIR"
          sudo ./doexternal.sh -s 64G "$GITHUB_WORKSPACE/wendyos-nvme.img"

      - name: Upload image and update device manifest
        if: github.event_name != 'pull_request'
        env:
          DEPLOY_DIR: ${{ github.workspace }}/build/tmp/deploy/images/${{ matrix.machine }}
          MACHINE: ${{ matrix.machine }}
          PUBLISHER_DEVICE: ${{ matrix.publisher_device }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK_URL }}
        run: |
          VERSION=$(grep 'DISTRO_VERSION' "$GITHUB_WORKSPACE/wendyos/conf/distro/wendyos.conf" | head -1 | sed 's/.*"\(.*\)"/\1/')
          TOKEN=$(gcloud auth print-access-token)

          if [[ "$MACHINE" == raspberry* ]]; then
            IMAGE_FILE="$DEPLOY_DIR/wendyos-image-${MACHINE}.rootfs.wic"
          else
            IMAGE_FILE="$GITHUB_WORKSPACE/wendyos-nvme.img"
          fi

          ARGS=(
            --device "$PUBLISHER_DEVICE"
            --version "${VERSION}-nightly"
            --file "$IMAGE_FILE"
            --nightly
            --skip-master-manifest
            --access-token "$TOKEN"
          )

          # For Jetson, include the tegraflash as the recovery file
          if [[ "$MACHINE" != raspberry* ]]; then
            ARGS+=(--recovery-file "$DEPLOY_DIR/wendyos-image-${MACHINE}.tegraflash.tar.gz")
          fi

          # Include Mender OTA artifact if the build produced one
          OTA_FILE=$(find "$DEPLOY_DIR" -maxdepth 1 -name "wendyos-image-${MACHINE}*.mender" -print -quit 2>/dev/null || true)
          if [[ -n "$OTA_FILE" ]]; then
            ARGS+=(--ota-update "$OTA_FILE")
          fi

          cd "$GITHUB_WORKSPACE/wendy-os-publisher/cmd"
          go run upload_and_manifest.go "${ARGS[@]}"

  publish:
    name: Update master manifest
    needs: build
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions:
      contents: read
      id-token: write
    runs-on:
      - runs-on
      - family=c7i-flex.8xlarge
      - spot=false
      - run-id=${{ github.run_id }}-publish
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: wendyos

      - name: Checkout publisher
        uses: actions/checkout@v4
        with:
          repository: wendylabsinc/wendy-os-publisher
          path: wendy-os-publisher

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wendy-os-publisher/go.mod

      - name: Update master manifest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_NIGHTLY_WEBHOOK_URL }}
        run: |
          VERSION=$(grep 'DISTRO_VERSION' "$GITHUB_WORKSPACE/wendyos/conf/distro/wendyos.conf" | head -1 | sed 's/.*"\(.*\)"/\1/')
          TOKEN=$(gcloud auth print-access-token)

          cd "$GITHUB_WORKSPACE/wendy-os-publisher/cmd"
          for DEVICE in raspberry-pi-3 raspberry-pi-4 raspberry-pi-5 jetson-orin-nano; do
            go run upload_and_manifest.go \
              --device "$DEVICE" \
              --version "${VERSION}-nightly" \
              --nightly \
              --master-manifest-only \
              --access-token "$TOKEN"
          done
