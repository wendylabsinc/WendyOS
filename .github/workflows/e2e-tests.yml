name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      hostname:
        description: 'Device hostname (empty = auto-discover via mDNS)'
        required: false
        default: ''
      tests:
        description: 'Comma-separated E2E test names (empty = all applicable)'
        required: false
        default: ''
      jobs:
        description: 'Jobs to run: all, discover, e2e (default: all)'
        required: false
        default: 'all'
      platform:
        description: 'CLI platform to run E2E tests on: all, macos, linux (default: all)'
        required: false
        default: 'all'
  workflow_call:
    inputs:
      hostname:
        type: string
        required: false
        default: ''
      tests:
        type: string
        required: false
        default: ''
      jobs:
        type: string
        required: false
        default: 'all'
      platform:
        type: string
        required: false
        default: 'all'

jobs:
  device-discovery:
    name: Device discovery (macOS CLI)
    if: inputs.jobs == 'all' || inputs.jobs == 'discover' || inputs.jobs == 'e2e' || inputs.jobs == 'integration'
    runs-on:
      group: wendy-developer
      labels: [self-hosted, macOS, ARM64]
    concurrency:
      group: device-discovery-macos
      cancel-in-progress: false
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build CLI
        run: make build-cli

      - name: Discover devices
        id: discover
        run: |
          INPUT_HOSTNAME='${{ inputs.hostname }}'

          if [[ -n "$INPUT_HOSTNAME" ]]; then
            if [[ "$INPUT_HOSTNAME" != *.local ]] && [[ "$INPUT_HOSTNAME" != *.* ]] && [[ "$INPUT_HOSTNAME" != *:* ]]; then
              INPUT_HOSTNAME="${INPUT_HOSTNAME}.local"
            fi
            MATRIX=$(jq -cn --arg hostname "$INPUT_HOSTNAME" '[{hostname: $hostname, displayName: $hostname}]')
            echo "$MATRIX" | jq .
            echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DISCOVER_STDERR=$(mktemp)
          RESULT=$(./bin/wendy discover --json --timeout 10s 2>"$DISCOVER_STDERR" || true)
          cat "$DISCOVER_STDERR" >&2 || true
          rm -f "$DISCOVER_STDERR"
          if [[ -n "$RESULT" ]]; then
            echo "$RESULT" | jq .
          fi

          EXPECTED=(
            "wendyos-keen-channel.local"
            "wendyos-robust-cloud.local"
            "wendyos-dynamic-cosmos.local"
            "wendy-SER9.local"
          )

          FAIL=0
          for host in "${EXPECTED[@]}"; do
            if echo "$RESULT" | jq -e --arg h "$host" \
              '.lanDevices[] | select(.hostname == $h)' > /dev/null 2>&1; then
              echo "FOUND: $host"
            else
              echo "MISSING: $host"
              FAIL=1
            fi
          done

          if [ $FAIL -ne 0 ]; then
            echo "WARNING: Some expected devices were not found. They may be offline."
          fi

          MATRIX=$(echo "$RESULT" | jq -c '[
            .lanDevices[]
            | select((.hostname // .ipAddress) != null and (.hostname // .ipAddress) != "")
            | {
                hostname: (.hostname // .ipAddress),
                displayName: (.displayName // .hostname // .ipAddress)
              }
          ]' 2>/dev/null || true)

          if [[ -z "$MATRIX" ]]; then
            MATRIX='[]'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          COUNT=$(echo "$MATRIX" | jq 'length')
          echo "Found $COUNT device(s)."

  e2e-tests-macos-cli:
    name: E2E tests (macOS CLI -> ${{ matrix.device.displayName }} device)
    needs: device-discovery
    if: (inputs.jobs == 'all' || inputs.jobs == 'e2e' || inputs.jobs == 'integration') && (inputs.platform == 'all' || inputs.platform == 'macos') && needs.device-discovery.outputs.matrix != '[]'
    runs-on:
      group: wendy-developer
      labels: [self-hosted, macOS, ARM64]
    concurrency:
      group: e2e-tests-macos-${{ matrix.device.hostname }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.device-discovery.outputs.matrix) }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: go
    env:
      DEVICE_HOSTNAME: ${{ matrix.device.hostname }}
      INPUT_TESTS: ${{ inputs.tests }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build CLI
        run: make build-cli

      - name: Prepare Docker
        run: |
          if ! docker info >/dev/null 2>&1; then
            echo "Docker not available, starting Colima..."
            colima start
            until docker info >/dev/null 2>&1; do sleep 2; done
          else
            echo "Docker already available, skipping Colima restart"
          fi
          docker buildx ls 2>/dev/null | awk '/^wendy/{print $1}' | xargs -r docker buildx rm --force 2>/dev/null || true
          docker system prune -f 2>/dev/null || true

      - name: Run E2E tests
        run: |
          # All wendy CLI calls below run via SSH to localhost rather than
          # directly. The self-hosted runner runs as a macOS LaunchAgent which
          # does not hold the Local Network TCC permission that macOS requires
          # for mDNS (.local) resolution and link-local connections. An SSH
          # session to localhost runs under the logged-in user, which has that
          # permission. See nightly-os-update.yml for the same pattern.
          WORKDIR="$(pwd)"
          SSH_ENV="export PATH='$PATH' DOCKER_HOST='${DOCKER_HOST:-}'"
          SSH="ssh -o StrictHostKeyChecking=no localhost"

          TEST_ARGS="-w $WORKDIR/bin/wendy"

          if [[ -n "$INPUT_TESTS" ]]; then
            HAS_TESTS=false
            IFS=',' read -ra TEST_ARRAY <<< "$INPUT_TESTS"
            for t in "${TEST_ARRAY[@]}"; do
              t="$(echo "$t" | xargs)"
              TEST_ARGS="$TEST_ARGS -t $t"
              HAS_TESTS=true
            done
            if [[ "$HAS_TESTS" == false ]]; then
              echo "No applicable tests requested, skipping."
              exit 0
            fi
          else
            for t in swift-hello swift-network swift-bluetooth python-hello python-network python-gpu python-bluetooth python-no-network python-no-bluetooth; do
              TEST_ARGS="$TEST_ARGS -t $t"
            done
          fi

          BUILDER="wendy-$(echo "$DEVICE_HOSTNAME" | tr -c '[:alnum:]' '-')"
          echo "==> Starting E2E tests on $DEVICE_HOSTNAME (builder: $BUILDER)"
          $SSH "export PATH='$PATH' DOCKER_HOST='${DOCKER_HOST:-}' WENDY_BUILDX_BUILDER='$BUILDER' && cd '$WORKDIR' && scripts/run-e2e-tests.sh $TEST_ARGS -h '$DEVICE_HOSTNAME'"
          rc=$?
          docker buildx rm "$BUILDER" --force 2>/dev/null || true
          exit $rc

      - name: Cleanup
        if: always()
        run: make clean

  e2e-tests-linux-cli:
    name: E2E tests (Linux CLI -> ${{ matrix.device.displayName }} device)
    needs: device-discovery
    if: (inputs.jobs == 'all' || inputs.jobs == 'e2e' || inputs.jobs == 'integration') && (inputs.platform == 'all' || inputs.platform == 'linux') && needs.device-discovery.outputs.matrix != '[]'
    runs-on:
      group: wendy-developer
      labels: [self-hosted, Linux]
    concurrency:
      group: e2e-tests-linux-${{ matrix.device.hostname }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.device-discovery.outputs.matrix) }}
    timeout-minutes: 60
    defaults:
      run:
        working-directory: go
    env:
      DEVICE_HOSTNAME: ${{ matrix.device.hostname }}
      INPUT_TESTS: ${{ inputs.tests }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Build CLI
        run: make build-cli

      - name: Run E2E tests
        run: |
          TEST_ARGS="-w ./bin/wendy"

          if [[ -n "$INPUT_TESTS" ]]; then
            HAS_TESTS=false
            IFS=',' read -ra TEST_ARRAY <<< "$INPUT_TESTS"
            for t in "${TEST_ARRAY[@]}"; do
              t="$(echo "$t" | xargs)"
              if [[ "$t" == swift-* ]]; then
                echo "Skipping swift test on Linux CLI: $t"
                continue
              fi
              TEST_ARGS="$TEST_ARGS -t $t"
              HAS_TESTS=true
            done
            if [[ "$HAS_TESTS" == false ]]; then
              echo "No applicable tests requested, skipping."
              exit 0
            fi
          else
            for t in python-hello python-network python-gpu python-bluetooth python-no-network python-no-bluetooth; do
              TEST_ARGS="$TEST_ARGS -t $t"
            done
          fi

          BUILDER="wendy-$(echo "$DEVICE_HOSTNAME" | tr -c '[:alnum:]' '-')"
          echo "==> Network diagnostics for $DEVICE_HOSTNAME:"
          ip route get "$DEVICE_HOSTNAME" 2>/dev/null || true
          arp -n "$DEVICE_HOSTNAME" 2>/dev/null || true
          if ! nc -zw 5 "$DEVICE_HOSTNAME" 50051 2>/dev/null; then
            echo "WARNING: $DEVICE_HOSTNAME port 50051 unreachable, skipping"
            exit 0
          fi
          echo "nc port 50051: OK"
          nc -zw 5 "$DEVICE_HOSTNAME" 5000  2>&1 && echo "nc port 5000: OK"  || echo "nc port 5000: FAILED"
          WENDY_BUILDX_BUILDER="$BUILDER" scripts/run-e2e-tests.sh $TEST_ARGS -h "$DEVICE_HOSTNAME"
          rc=$?
          docker buildx rm "$BUILDER" --force 2>/dev/null || true
          exit $rc

      - name: Cleanup
        if: always()
        run: make clean

  e2e-test-summary:
    name: E2E test summary
    runs-on: ubuntu-latest
    needs: [device-discovery, e2e-tests-macos-cli, e2e-tests-linux-cli]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.device-discovery.result }}" == "success" ]]; then
            echo "- Device discovery: passed" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.device-discovery.result }}" == "skipped" ]]; then
            echo "- Device discovery: skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Device discovery: ${{ needs.device-discovery.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.e2e-tests-macos-cli.result }}" == "success" ]]; then
            echo "- E2E tests (macOS CLI): passed" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.e2e-tests-macos-cli.result }}" == "skipped" ]]; then
            echo "- E2E tests (macOS CLI): skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- E2E tests (macOS CLI): ${{ needs.e2e-tests-macos-cli.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.e2e-tests-linux-cli.result }}" == "success" ]]; then
            echo "- E2E tests (Linux CLI): passed" >> "$GITHUB_STEP_SUMMARY"
          elif [[ "${{ needs.e2e-tests-linux-cli.result }}" == "skipped" ]]; then
            echo "- E2E tests (Linux CLI): skipped" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- E2E tests (Linux CLI): ${{ needs.e2e-tests-linux-cli.result }}" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ needs.e2e-tests-macos-cli.result }}" == "failure" || "${{ needs.e2e-tests-linux-cli.result }}" == "failure" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more blocking tests failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
