name: Swift Format Check and Fix

on:
  pull_request:
    branches: [main]
permissions:
  pull-requests: write
jobs:
  check-bugfix:
    name: Check for BUGFIX tag
    runs-on: ubuntu-latest
    outputs:
      spot: ${{ steps.check.outputs.spot }}
    steps:
      - name: Check PR for BUGFIX tag or bug label
        id: check
        env:
          HAS_BUG_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'bug') }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          SPOT="true"

          if [[ "$PR_TITLE" == *"[BUGFIX]"* ]] || [[ "$PR_BODY" == *"[BUGFIX]"* ]]; then
            echo "Found [BUGFIX] tag in PR, using on-demand instances"
            SPOT="false"
          elif [ "$HAS_BUG_LABEL" == "true" ]; then
            echo "Found 'bug' label on PR, using on-demand instances"
            SPOT="false"
          fi

          echo "spot=$SPOT" >> $GITHUB_OUTPUT

  format-check:
    name: Swift Format Check
    needs: check-bugfix
    runs-on: runs-on=${{ github.run_id }}/runner=2cpu-linux-x64/spot=${{ needs.check-bugfix.outputs.spot }}
    container: swift:6.2.3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Run Swift Format Check
        id: format_check
        shell: bash
        run: |
          set +e
          set -o pipefail
          swift format lint --recursive --strict Sources 2>&1 | tee format_output.txt
          status=${PIPESTATUS[0]}
          {
            echo "lint_output<<EOF"
            cat format_output.txt
            echo "EOF"
            echo "exit_code=$status"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Remove Previous Format Comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const targetHeader = '## Swift Format Check Failed';
            for (const comment of comments) {
              if (comment.user?.type === 'Bot' && comment.body?.includes(targetHeader)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }

      - name: Comment on PR
        if: steps.format_check.outputs.exit_code != '0'
        uses: actions/github-script@v6
        env:
          LINT_OUTPUT: ${{ steps.format_check.outputs.lint_output }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lintOutput = process.env.LINT_OUTPUT?.trim();
            const formattedOutput = lintOutput ? `\`\`\`\n${lintOutput}\n\`\`\`` : '_No formatter output captured._';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Swift Format Check Failed
            
            The Swift formatter found issues with your code. Please run the following command to fix them:
            
            \`\`\`
            swift format --recursive --in-place Sources
            \`\`\`
            
            <details>
            <summary>Formatting issues</summary>
            
            ${formattedOutput}
            
            </details>
            
            Then commit and push the changes.`
            });

      - name: Fail Workflow
        if: steps.format_check.outputs.exit_code != '0'
        run: exit 1
