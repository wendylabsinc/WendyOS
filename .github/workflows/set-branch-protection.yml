name: Set Branch Protection

on:
  workflow_dispatch:

permissions: {}

jobs:
  set-branch-protection:
    name: Configure Branch Protection
    runs-on: ubuntu-latest
    steps:
      - name: Set Branch Protection for main
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ADMIN_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -e
          
          echo "Configuring branch protection for refs/heads/main..."
          echo "Repository: $REPO_OWNER/$REPO_NAME"
          
          # Validate that REPO_ADMIN_TOKEN is set
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "Error: REPO_ADMIN_TOKEN secret is not set."
            echo "Please create a personal access token with 'repo' permissions"
            echo "(or 'admin:org' + 'repo' for organization repos)"
            echo "and add it as a repository secret named REPO_ADMIN_TOKEN."
            exit 1
          fi
          
          # Configure branch protection using GitHub REST API
          # Documentation: https://docs.github.com/en/rest/branches/branch-protection
          
          response=$(curl -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -w "\n%{http_code}" \
            "https://api.github.com/repos/$REPO_OWNER/$REPO_NAME/branches/main/protection" \
            -d '{
              "required_status_checks": {
                "strict": true,
                "contexts": ["Swift Tests"]
              },
              "enforce_admins": null,
              "required_pull_request_reviews": {
                "dismiss_stale_reviews": true,
                "require_code_owner_reviews": false,
                "required_approving_review_count": 1
              },
              "restrictions": null,
              "required_linear_history": false,
              "allow_force_pushes": false,
              "allow_deletions": false,
              "block_creations": false,
              "required_conversation_resolution": false,
              "lock_branch": false,
              "allow_fork_syncing": false
            }')
          
          # Extract HTTP status code from last line
          http_code=$(echo "$response" | tail -n1)
          # Extract response body (everything except last line)
          body=$(echo "$response" | sed '$d')
          
          echo ""
          echo "API Response (HTTP $http_code):"
          echo "$body" | jq '.' || echo "$body"
          
          # Check if the request was successful
          if [ "$http_code" -ge 200 ] && [ "$http_code" -lt 300 ]; then
            echo ""
            echo "✓ Branch protection successfully configured for main branch!"
            echo ""
            echo "Configuration applied:"
            echo "  - Required status checks: Swift Tests (strict)"
            echo "  - Required pull request reviews: 1 approval"
            echo "  - Dismiss stale reviews: enabled"
            echo "  - Force pushes: disabled"
            echo "  - Deletions: disabled"
          else
            echo ""
            echo "✗ Failed to configure branch protection."
            echo "HTTP Status: $http_code"
            
            # Provide helpful error messages for common issues
            case $http_code in
              401)
                echo ""
                echo "Authentication failed. Please verify:"
                echo "  1. REPO_ADMIN_TOKEN secret is correctly set"
                echo "  2. The token has not expired"
                echo "  3. The token has 'repo' permissions (or 'admin:org' + 'repo' for org repos)"
                ;;
              403)
                echo ""
                echo "Permission denied. Please verify:"
                echo "  1. The token has admin permissions for this repository"
                echo "  2. Your account has admin access to this repository"
                ;;
              404)
                echo ""
                echo "Repository or branch not found. Please verify:"
                echo "  1. The repository exists and is accessible"
                echo "  2. The main branch exists"
                ;;
            esac
            
            exit 1
          fi
