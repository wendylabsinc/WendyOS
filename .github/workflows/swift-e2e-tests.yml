name: Swift E2E Tests

on:
  push:
    branches:
      - kb.swift-e2e-tests
  workflow_dispatch:
    inputs:
      tests:
        description: 'Comma-separated SwiftPM test filters (empty = WendyE2ETests)'
        required: false
        default: ''
  workflow_call:
    inputs:
      tests:
        type: string
        required: false
        default: ''

concurrency:
  group: swift-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-e2e-tests:
    name: ${{ matrix.target.name }}
    # Unsupported entries remain visible as no-op placeholders while supported
    # macOS and Ubuntu entries run the Swift E2E harness against their target device.
    runs-on: ${{ matrix.target.runner_id == 'macos-26' && fromJSON('["self-hosted", "macOS"]') || matrix.target.runner_id == 'ubuntu-24-04' && fromJSON('["self-hosted", "linux"]') || 'ubuntu-latest' }}
    concurrency:
      group: ${{ matrix.target.status == 'enabled' && format('swift-e2e-{0}', matrix.target.device_id) || format('swift-e2e-placeholder-{0}', matrix.target.id) }}
      cancel-in-progress: false
    timeout-minutes: ${{ matrix.target.status == 'enabled' && 120 || 5 }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - id: macos-26-to-jetson-orin-nano
            name: macOS 26 → Jetson Orin Nano
            status: enabled
            status_label: Enabled
            runner_id: macos-26
            runner_name: macOS 26
            runner_labels: 'self-hosted, macOS, ARM64, macos-26'
            cli_os: macOS
            device_id: jetson-orin-nano
            device_name: Jetson Orin Nano
            device_address: wendyos-jetson-orin-nano.local
            agent_os: wendyOS
            transport: lan

          - id: macos-26-to-mac-mini
            name: macOS 26 → Mac mini
            status: enabled
            status_label: Enabled
            runner_id: macos-26
            runner_name: macOS 26
            runner_labels: 'self-hosted, macOS, ARM64, macos-26'
            cli_os: macOS
            device_id: mac-mini
            device_name: Mac mini
            device_address: mac-mini.local
            agent_os: macOS
            transport: lan

          - id: ubuntu-24-04-to-mac-mini
            name: Ubuntu 24.04 → Mac mini
            status: enabled
            status_label: Enabled
            runner_id: ubuntu-24-04
            runner_name: Ubuntu 24.04
            runner_labels: 'self-hosted, Linux, X64, ubuntu-24-04'
            cli_os: linux
            device_id: mac-mini
            device_name: Mac mini
            device_address: mac-mini.local
            agent_os: macOS
            transport: lan

          - id: ubuntu-24-04-to-jetson-orin-nano
            name: Ubuntu 24.04 → Jetson Orin Nano
            status: enabled
            status_label: Enabled
            runner_id: ubuntu-24-04
            runner_name: Ubuntu 24.04
            runner_labels: 'self-hosted, Linux, X64, ubuntu-24-04'
            cli_os: linux
            device_id: jetson-orin-nano
            device_name: Jetson Orin Nano
            device_address: wendyos-jetson-orin-nano.local
            agent_os: wendyOS
            transport: lan

          - id: windows-11-to-jetson-orin-nano
            name: Windows 11 → Jetson Orin Nano 🚧
            status: not-supported-yet
            status_label: Not Supported Yet
            runner_id: windows-11
            runner_name: Windows 11
            runner_labels: 'self-hosted, Windows, X64, windows-11'
            cli_os: windows
            device_id: jetson-orin-nano
            device_name: Jetson Orin Nano
            transport: lan

          - id: macos-26-to-raspberry-pi-5
            name: macOS 26 → Raspberry Pi 5
            status: enabled
            status_label: Enabled
            runner_id: macos-26
            runner_name: macOS 26
            runner_labels: 'self-hosted, macOS, ARM64, macos-26'
            cli_os: macOS
            device_id: raspberry-pi-5
            device_name: Raspberry Pi 5
            device_address: wendyos-raspberry-pi-5.local
            agent_os: wendyOS
            transport: lan

          - id: ubuntu-24-04-to-raspberry-pi-5
            name: Ubuntu 24.04 → Raspberry Pi 5
            status: enabled
            status_label: Enabled
            runner_id: ubuntu-24-04
            runner_name: Ubuntu 24.04
            runner_labels: 'self-hosted, Linux, X64, ubuntu-24-04'
            cli_os: linux
            device_id: raspberry-pi-5
            device_name: Raspberry Pi 5
            device_address: wendyos-raspberry-pi-5.local
            agent_os: wendyOS
            transport: lan

          - id: windows-11-to-raspberry-pi-5
            name: Windows 11 → Raspberry Pi 5 🚧
            status: not-supported-yet
            status_label: Not Supported Yet
            runner_id: windows-11
            runner_name: Windows 11
            runner_labels: 'self-hosted, Windows, X64, windows-11'
            cli_os: windows
            device_id: raspberry-pi-5
            device_name: Raspberry Pi 5
            transport: lan

          - id: macos-26-to-esp32-c6
            name: macOS 26 → ESP32-C6 🚧
            status: not-supported-yet
            status_label: Not Supported Yet
            runner_id: macos-26
            runner_name: macOS 26
            runner_labels: 'self-hosted, macOS, ARM64, macos-26'
            cli_os: macOS
            device_id: esp32-c6
            device_name: ESP32-C6
            transport: ble

          - id: ubuntu-24-04-to-esp32-c6
            name: Ubuntu 24.04 → ESP32-C6 🚧
            status: not-supported-yet
            status_label: Not Supported Yet
            runner_id: ubuntu-24-04
            runner_name: Ubuntu 24.04
            runner_labels: 'self-hosted, Linux, X64, ubuntu-24-04'
            cli_os: linux
            device_id: esp32-c6
            device_name: ESP32-C6
            transport: ble

          - id: windows-11-to-esp32-c6
            name: Windows 11 → ESP32-C6 🚧
            status: not-supported-yet
            status_label: Not Supported Yet
            runner_id: windows-11
            runner_name: Windows 11
            runner_labels: 'self-hosted, Windows, X64, windows-11'
            cli_os: windows
            device_id: esp32-c6
            device_name: ESP32-C6
            transport: ble
    steps:
      - uses: actions/checkout@v6
        if: matrix.target.status == 'enabled'

      - name: Capture Swift toolchain version
        if: matrix.target.status == 'enabled'
        id: swift-toolchain
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.target.runner_id }}" == "macos-26" ]]; then
            version="$(xcodebuild -version | awk '/Xcode/ { print $2 }')"
          else
            version="$(swift --version | head -n 1 | tr -cs '[:alnum:]._-' '-')"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM package resolution
        if: matrix.target.status == 'enabled'
        uses: actions/cache@v5
        with:
          path: |
            swift/WendyE2ETests/.build/checkouts
            swift/WendyE2ETests/.build/repositories
            ~/Library/Caches/org.swift.swiftpm
            ~/.cache/org.swift.swiftpm
          key: swift-e2e-swiftpm-${{ runner.os }}-${{ steps.swift-toolchain.outputs.version }}-${{ hashFiles('swift/WendyE2ETests/Package.resolved') }}
          restore-keys: |
            swift-e2e-swiftpm-${{ runner.os }}-${{ steps.swift-toolchain.outputs.version }}-
            swift-e2e-swiftpm-${{ runner.os }}-

      - name: Compute Swift E2E run ID
        if: matrix.target.status == 'enabled'
        id: e2e-run
        shell: bash
        run: |
          set -euo pipefail
          printf -v attempt_suffix '%04d' "${GITHUB_RUN_ATTEMPT:-1}"
          echo "run_id=${{ matrix.target.id }}-gh${GITHUB_RUN_ID}-${attempt_suffix}" >> "$GITHUB_OUTPUT"

      - name: Run Swift E2E tests
        if: matrix.target.status == 'enabled'
        working-directory: swift
        shell: bash
        env:
          WENDY_E2E_TEST_FILTERS: ${{ inputs.tests || '' }}
          WENDY_E2E_RUN_ID: ${{ steps.e2e-run.outputs.run_id }}
          WENDY_E2E_CLI_OS: ${{ matrix.target.cli_os }}
          WENDY_E2E_AGENT_OS: ${{ matrix.target.agent_os }}
          WENDY_E2E_TRANSPORT: ${{ matrix.target.transport }}
        run: |
          set -euo pipefail
          bash ./Scripts/E2ETest.sh \
            --output-dir Build/e2e \
            --agent-address "${{ matrix.target.device_address }}"

      - name: Upload Swift E2E report
        if: always() && matrix.target.status == 'enabled'
        uses: actions/upload-artifact@v5
        with:
          name: wendy-e2e-${{ steps.e2e-run.outputs.run_id }}
          path: swift/Build/e2e/${{ steps.e2e-run.outputs.run_id }}/**
          if-no-files-found: warn
          retention-days: 14

      - name: Not Supported Yet
        if: matrix.target.status != 'enabled'
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## ${{ matrix.target.name }}"
            echo
            echo "Status: **${{ matrix.target.status_label }}**"
            echo
            echo "This matrix entry is intentionally visible but currently runs as a no-op."
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Runner | ${{ matrix.target.runner_name }} |"
            echo "| Planned runner labels | \`${{ matrix.target.runner_labels }}\` |"
            echo "| CLI OS | \`${{ matrix.target.cli_os }}\` |"
            echo "| Device | ${{ matrix.target.device_name }} |"
            echo "| Device ID | \`${{ matrix.target.device_id }}\` |"
            echo "| Transport | \`${{ matrix.target.transport }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
