name: Swift macOS CI

on:
  pull_request:
    paths:
      - 'swift/**'
      - 'Proto/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'swift/**'
      - 'Proto/**'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: swift-macos-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BASE_VERSION: 1.0.0
  XCODE_VERSION: '26.3'

jobs:
  prepare:
    name: Prepare CI metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      branch_name: ${{ steps.metadata.outputs.branch_name }}
      sanitized_branch_name: ${{ steps.metadata.outputs.sanitized_branch_name }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
      run_url: ${{ steps.metadata.outputs.run_url }}
    steps:
      - name: Compute version metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BRANCH_NAME="${GITHUB_REF_NAME}"
            COMMIT_SHA="${GITHUB_SHA}"
          fi

          SANITIZED_BRANCH_NAME=$(printf '%s' "$BRANCH_NAME" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')

          if [ -z "$SANITIZED_BRANCH_NAME" ]; then
            SANITIZED_BRANCH_NAME="detached-head"
          fi

          VERSION="${BASE_VERSION}-${SANITIZED_BRANCH_NAME}.${GITHUB_RUN_NUMBER}"
          SHORT_SHA=$(printf '%s' "$COMMIT_SHA" | cut -c1-7)
          ARTIFACT_NAME="wendy-agent-macos-universal-${VERSION}.zip"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "sanitized_branch_name=$SANITIZED_BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

  swift-tests:
    name: Swift package tests
    runs-on: macos-26
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Capture selected Xcode version
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(xcodebuild -version | awk '/Xcode/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM package resolution
        uses: actions/cache@v4
        with:
          path: |
            swift/WendyAgentCore/.build/checkouts
            swift/WendyAgentCore/.build/repositories
            ~/Library/Caches/org.swift.swiftpm
            ~/.cache/org.swift.swiftpm
          key: swiftpm-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-${{ hashFiles('swift/WendyAgentCore/Package.resolved') }}
          restore-keys: |
            swiftpm-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-
            swiftpm-${{ runner.os }}-

      - name: Run swift test
        working-directory: swift/WendyAgentCore
        shell: bash
        run: |
          set -euo pipefail
          swift test

  build-macos-release:
    name: Release macOS app build
    runs-on: macos-26
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Capture selected Xcode version
        id: xcode
        shell: bash
        run: |
          set -euo pipefail
          echo "version=$(xcodebuild -version | awk '/Xcode/ { print $2 }')" >> "$GITHUB_OUTPUT"

      - name: Cache Xcode package resolution
        uses: actions/cache@v4
        with:
          path: |
            swift/.ci/PackageCache
            swift/.ci/SourcePackages
          key: xcode-packages-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-${{ hashFiles('swift/WendyAgentCore/Package.resolved') }}
          restore-keys: |
            xcode-packages-${{ runner.os }}-xcode-${{ steps.xcode.outputs.version }}-
            xcode-packages-${{ runner.os }}-

      - name: Resolve Swift package dependencies
        working-directory: swift
        env:
          PACKAGE_CACHE_DIR: ${{ github.workspace }}/swift/.ci/PackageCache
          SOURCE_PACKAGES_DIR: ${{ github.workspace }}/swift/.ci/SourcePackages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$PACKAGE_CACHE_DIR" "$SOURCE_PACKAGES_DIR"

          xcodebuild -resolvePackageDependencies \
            -workspace WendyAgent.xcworkspace \
            -scheme WendyAgentMac \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -packageCachePath "$PACKAGE_CACHE_DIR" \
            -skipMacroValidation

      - name: Build Release universal app
        working-directory: swift
        env:
          DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
          PACKAGE_CACHE_DIR: ${{ github.workspace }}/swift/.ci/PackageCache
          SOURCE_PACKAGES_DIR: ${{ github.workspace }}/swift/.ci/SourcePackages
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "$DERIVED_DATA_PATH"

          xcodebuild build \
            -workspace WendyAgent.xcworkspace \
            -scheme WendyAgentMac \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -clonedSourcePackagesDirPath "$SOURCE_PACKAGES_DIR" \
            -packageCachePath "$PACKAGE_CACHE_DIR" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -skipMacroValidation

      - name: Ad-hoc sign and archive app
        id: package
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
          DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="$DERIVED_DATA_PATH/Build/Products/Release/WendyAgentMac.app"
          ARCHIVE_PATH="$RUNNER_TEMP/$ARTIFACT_NAME"

          test -d "$APP_PATH"
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ARCHIVE_PATH"
          test -f "$ARCHIVE_PATH"

          echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.artifact_name }}
          path: ${{ steps.package.outputs.archive_path }}
          retention-days: 14
          if-no-files-found: error

      - name: Add workflow summary
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          RUN_URL: ${{ needs.prepare.outputs.run_url }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
          XCODE_SELECTED: ${{ steps.xcode.outputs.version }}
        shell: bash
        run: |
          {
            echo "## Swift macOS artifact"
            echo
            echo "- Version: ${VERSION}"
            echo "- Branch: ${BRANCH_NAME}"
            echo "- Commit: ${SHORT_SHA}"
            echo "- Artifact: ${ARTIFACT_NAME}"
            echo "- Xcode: ${XCODE_SELECTED}"
            echo "- Workflow run: ${RUN_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

  notify-slack:
    name: Slack placeholder
    runs-on: ubuntu-latest
    needs: [prepare, build-macos-release]
    if: needs.build-macos-release.result == 'success'
    continue-on-error: true
    steps:
      - name: Compose Slack message
        env:
          ARTIFACT_NAME: ${{ needs.prepare.outputs.artifact_name }}
          BRANCH_NAME: ${{ needs.prepare.outputs.branch_name }}
          RUN_URL: ${{ needs.prepare.outputs.run_url }}
          SHORT_SHA: ${{ needs.prepare.outputs.short_sha }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          {
            echo 'SLACK_MESSAGE<<EOF'
            echo '- Ad-hoc macOS build ready'
            echo "- Version: ${VERSION}"
            echo "- Branch: ${BRANCH_NAME}"
            echo "- Commit: ${SHORT_SHA}"
            echo "- Download: ${RUN_URL}"
            echo "- Artifact: ${ARTIFACT_NAME}"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Post Slack placeholder
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$SLACK_MESSAGE"

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not configured; logged placeholder message to stdout."
            exit 0
          fi

          python3 - <<'PY' > payload.json
          import json
          import os

          print(json.dumps({"text": os.environ["SLACK_MESSAGE"]}))
          PY

          curl -fsS -X POST \
            -H 'Content-Type: application/json' \
            --data @payload.json \
            "$SLACK_WEBHOOK_URL"
