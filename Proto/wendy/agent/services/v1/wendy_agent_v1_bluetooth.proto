syntax = "proto3";

package wendy.agent.services.v1;

import "wendy/agent/services/v1/wendy_agent_v1_service.proto";

// Bluetooth command sent from CLI to Agent over L2CAP
message BluetoothCommand {
    oneof command {
        WifiListCommand wifi_list = 1;
        WifiConnectCommand wifi_connect = 2;
        WifiStatusCommand wifi_status = 3;
        WifiDisconnectCommand wifi_disconnect = 4;
        AppsListCommand apps_list = 5;
        AppsStopCommand apps_stop = 6;
        AppsRemoveCommand apps_remove = 7;
        AgentVersionCommand agent_version = 8;
        HardwareListCommand hardware_list = 9;
        BluetoothListCommand bluetooth_list = 10;
        BluetoothConnectCommand bluetooth_connect = 11;
        BluetoothDisconnectCommand bluetooth_disconnect = 12;
        BluetoothForgetCommand bluetooth_forget = 13;
        WifiKnownListCommand wifi_known_list = 14;
        WifiSetPriorityCommand wifi_set_priority = 15;
        WifiReorderCommand wifi_reorder = 16;
        WifiForgetCommand wifi_forget = 17;
    }
}

// Empty commands (no parameters needed)
message WifiListCommand {}
message WifiStatusCommand {}
message WifiDisconnectCommand {}
message AppsListCommand {}
message AgentVersionCommand {}
message HardwareListCommand {}

// Bluetooth device commands
message BluetoothListCommand {
    bool paired_only = 1;
}

message BluetoothConnectCommand {
    string address = 1;
}

message BluetoothDisconnectCommand {
    string address = 1;
}

message BluetoothForgetCommand {
    string address = 1;
}

// Commands with parameters
message WifiConnectCommand {
    string ssid = 1;
    string password = 2;
    optional WiFiSecurityType security = 3;
    optional bool hidden = 4;
}

message WifiKnownListCommand {}

message WifiSetPriorityCommand {
    string ssid = 1;
    int32 priority = 2;
}

message WifiReorderCommand {
    repeated string order_ssids = 1;
}

message WifiForgetCommand {
    string ssid = 1;
}

message AppsStopCommand {
    string app_name = 1;
}

message AppsRemoveCommand {
    string app_name = 1;
    bool purge_image = 2;
}

// Bluetooth response sent from Agent to CLI over L2CAP
message BluetoothResponse {
    oneof response {
        WifiListResponse wifi_list = 1;
        WifiConnectResponse wifi_connect = 2;
        WifiStatusResponse wifi_status = 3;
        WifiDisconnectResponse wifi_disconnect = 4;
        AppsListResponse apps_list = 5;
        AppsStopResponse apps_stop = 6;
        AppsRemoveResponse apps_remove = 7;
        AgentVersionResponse agent_version = 8;
        HardwareListResponse hardware_list = 9;
        ErrorResponse error = 10;
        BluetoothListResponse bluetooth_list = 11;
        BluetoothConnectResponse bluetooth_connect = 12;
        BluetoothDisconnectResponse bluetooth_disconnect = 13;
        BluetoothForgetResponse bluetooth_forget = 14;
        WifiKnownListResponse wifi_known_list = 15;
        WifiSetPriorityResponse wifi_set_priority = 16;
        WifiReorderResponse wifi_reorder = 17;
        WifiForgetResponse wifi_forget = 18;
    }
}

// WiFi responses
message WifiListResponse {
    repeated WifiNetworkInfo networks = 1;
}

message WifiConnectResponse {
    bool success = 1;
    optional string error_message = 2;
}

message WifiStatusResponse {
    bool connected = 1;
    optional string ssid = 2;
    optional string error_message = 3;
}

message WifiDisconnectResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Apps responses
message AppsListResponse {
    repeated AppInfo apps = 1;
}

message AppsStopResponse {
    bool success = 1;
    optional string error_message = 2;
}

message AppsRemoveResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Other responses
message AgentVersionResponse {
    string version = 1;
    optional string os = 2;
    optional string os_version = 3;
    optional string cpu_architecture = 4;
    repeated string featureset = 5;
}

message HardwareListResponse {
    repeated HardwareInfo capabilities = 1;
}

message ErrorResponse {
    string message = 1;
}

// Bluetooth device responses
message BluetoothListResponse {
    repeated BluetoothDeviceInfo devices = 1;
}

message BluetoothConnectResponse {
    bool success = 1;
    optional string error_message = 2;
}

message BluetoothDisconnectResponse {
    bool success = 1;
    optional string error_message = 2;
}

message BluetoothForgetResponse {
    bool success = 1;
    optional string error_message = 2;
}

message WifiKnownListResponse {
    repeated KnownWifiNetworkInfo networks = 1;
}

message KnownWifiNetworkInfo {
    string ssid = 1;
    string uuid = 2;
    int32 priority = 3;
    WiFiSecurityType security = 4;
}

message WifiSetPriorityResponse {
    bool success = 1;
    optional string error_message = 2;
}

message WifiReorderResponse {
    bool success = 1;
    optional string error_message = 2;
}

message WifiForgetResponse {
    bool success = 1;
    optional string error_message = 2;
}

// Shared types
message WifiNetworkInfo {
    string ssid = 1;
    optional int32 signal_strength = 2;
    WiFiSecurityType security = 3;
    bool is_known = 4;
    bool is_connected = 5;
    optional int32 priority = 6;
    optional int32 rssi_dbm = 7;
}

message AppInfo {
    string app_name = 1;
    string app_version = 2;
    string state = 3;
    int32 failure_count = 4;
}

message HardwareInfo {
    string type = 1;
    string name = 2;
    bool available = 3;
}

// Information about a Bluetooth device
message BluetoothDeviceInfo {
    string name = 1;
    string address = 2;
    optional int32 rssi = 3;
    bool paired = 4;
    bool connected = 5;
    bool trusted = 6;
    string device_type = 7;
    optional string icon = 8;
}
