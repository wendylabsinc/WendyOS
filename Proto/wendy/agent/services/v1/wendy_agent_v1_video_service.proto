syntax = "proto3";

package wendy.agent.services.v1;

service WendyVideoService {
    rpc ListVideoDevices(ListVideoDevicesRequest) returns (ListVideoDevicesResponse);
    rpc StreamVideo(StreamVideoRequest) returns (stream VideoFrame);
}

message VideoDevice {
    uint32 id          = 1; // numeric suffix of /dev/videoN
    string name        = 2; // human-readable name from sysfs
    string path        = 3; // e.g. "/dev/video0"
}

message ListVideoDevicesRequest {}

message ListVideoDevicesResponse {
    repeated VideoDevice devices = 1;
}

message StreamVideoRequest {
    uint32 device_id  = 1; // 0 = first available device
    uint32 width      = 2; // pixels; 0 = device default
    uint32 height     = 3; // pixels; 0 = device default
    uint32 framerate  = 4; // fps; 0 = device default
}

message VideoFrame {
    bytes  data         = 1; // raw H.264 NAL units
    uint64 timestamp_ns = 2; // wall-clock timestamp in nanoseconds
}
