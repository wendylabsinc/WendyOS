syntax = "proto3";
package wendy.agent.services.v2;
option go_package = "github.com/wendylabsinc/wendy/proto/gen/agentpb/v2;agentpbv2";

service WendyAgentUpdateService {
    rpc UpdateAgent(stream UpdateAgentRequest) returns (stream UpdateAgentResponse);
}

message UpdateAgentRequest {
    oneof request_type {
        Chunk chunk = 1;
        ControlCommand control = 2;
    }

    message Chunk {
        bytes data = 1;
    }

    message ControlCommand {
        oneof command {
            Update update = 1;
        }

        message Update {
            // Field 3 (skip_gpg_verify) was removed: skipping signature
            // verification must be an agent build-time decision, never a
            // client-supplied request field.
            reserved 3;
            reserved "skip_gpg_verify";

            string sha256 = 1;
            bytes gpg_signature = 2;
        }
    }
}

message UpdateAgentResponse {
    oneof response_type {
        Updated updated = 1;
    }

    message Updated {}
}
