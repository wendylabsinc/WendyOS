openapi: 3.1.0
info:
  title: OCI Distribution Specification API
  version: 1.0.0
  description: |
    Open Container Initiative (OCI) Distribution Specification v1.0.0
    
    This API implements the OCI Distribution Specification which defines standards
    for container image distribution, content addressable storage, and content negotiation.
    
    Reference: https://specs.opencontainers.org/distribution-spec/
  contact:
    name: Open Container Initiative
    url: https://opencontainers.org
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:5000/v2
    description: Local development registry
  - url: https://registry.example.com/v2
    description: Production registry example

tags:
  - name: Registry
    description: Registry discovery and versioning
  - name: Manifests
    description: Image manifest operations
  - name: Blobs
    description: Content blob operations
  - name: Tags
    description: Image tag management

paths:
  # Registry Discovery
  /:
    get:
      tags:
        - Registry
      summary: Check if registry implements v2 API
      description: |
        Performs a lightweight availability check for the v2.0 registry API.
        Must respond with 401 if authentication is required.
      operationId: checkVersionSupport
      responses:
        '200':
          description: Registry supports v2 API
          headers:
            Docker-Distribution-API-Version:
              schema:
                type: string
                example: registry/2.0
              description: Indicates the registry supports the v2.0 API
        '401':
          description: Authentication required
          headers:
            WWW-Authenticate:
              schema:
                type: string
                example: Bearer realm="https://auth.example.com/token",service="registry.example.com"
              description: Authentication challenge header
  
  # Manifests
  /{name}/manifests/{reference}:
    get:
      tags:
        - Manifests
      summary: Get manifest
      description: |
        Retrieve the manifest identified by name and reference.
        Reference can be a digest or tag.
      operationId: getManifest
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/reference'
        - name: Accept
          in: header
          description: Accept header for requesting different media types
          required: false
          schema:
            type: string
            example: application/vnd.oci.image.manifest.v1+json
      responses:
        '200':
          description: Manifest successfully retrieved
          headers:
            Docker-Content-Digest:
              schema:
                type: string
                example: sha256:abc123...
              description: Digest of the manifest
            Content-Type:
              schema:
                type: string
                example: application/vnd.oci.image.manifest.v1+json
          content:
            application/vnd.oci.image.manifest.v1+json:
              schema:
                $ref: '#/components/schemas/Manifest'
            application/vnd.docker.distribution.manifest.v2+json:
              schema:
                $ref: '#/components/schemas/DockerManifest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    head:
      tags:
        - Manifests
      summary: Check manifest existence
      description: |
        Check if a manifest exists without retrieving it.
        Returns the same headers as GET but without the body.
      operationId: headManifest
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/reference'
        - name: Accept
          in: header
          description: Accept header for requesting different media types
          required: false
          schema:
            type: string
            example: application/vnd.oci.image.manifest.v1+json
      responses:
        '200':
          description: Manifest exists
          headers:
            Docker-Content-Digest:
              schema:
                type: string
                example: sha256:abc123...
              description: Digest of the manifest
            Content-Type:
              schema:
                type: string
                example: application/vnd.oci.image.manifest.v1+json
            Content-Length:
              schema:
                type: integer
                description: Size of the manifest in bytes
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    # put:
    #   tags:
    #     - Manifests
    #   summary: Put manifest
    #   description: |
    #     Upload a manifest for an image.
    #     The reference can be a tag or digest.
    #   operationId: putManifest
    #   parameters:
    #     - $ref: '#/components/parameters/name'
    #     - $ref: '#/components/parameters/reference'
    #   requestBody:
    #     required: true
    #     content:
    #       application/octet-stream:
    #         schema:
    #           type: string
    #           format: binary
    #       application/vnd.docker.distribution.manifest.v2+json:
    #         schema:
    #           type: string
    #           format: byte
    #       application/vnd.oci.image.manifest.v1+json:
    #         schema:
    #           type: string
    #           format: byte
    #   responses:
    #     '201':
    #       description: Manifest successfully uploaded
    #       headers:
    #         Location:
    #           schema:
    #             type: string
    #             description: URI of the uploaded manifest
    #         Docker-Content-Digest:
    #           schema:
    #             type: string
    #             description: Digest of the uploaded manifest
    #     '400':
    #       $ref: '#/components/responses/BadRequest'
    #     '401':
    #       $ref: '#/components/responses/Unauthorized'
    #     '404':
    #       $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Manifests
      summary: Delete manifest
      description: Delete the manifest identified by name and reference
      operationId: deleteManifest
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/reference'
      responses:
        '202':
          description: Manifest accepted for deletion
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  
  # Blobs
  /{name}/blobs/{digest}:
    get:
      tags:
        - Blobs
      summary: Get blob
      description: Retrieve a blob identified by digest
      operationId: getBlob
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/digest'
        - name: Range
          in: header
          description: HTTP range header for partial content
          required: false
          schema:
            type: string
            example: bytes=0-1024
      responses:
        '200':
          description: Blob successfully retrieved
          headers:
            Content-Length:
              schema:
                type: integer
                description: Size of the blob in bytes
            Docker-Content-Digest:
              schema:
                type: string
                description: Digest of the blob
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/vnd.oci.image.layer.v1.tar:
              schema:
                type: string
                format: binary
        '206':
          description: Partial content returned
          headers:
            Content-Range:
              schema:
                type: string
                example: bytes 0-1024/65536
        '307':
          description: Redirect to upload location
          headers:
            Location:
              schema:
                type: string
                description: URI to fetch the blob from
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    head:
      tags:
        - Blobs
      summary: Check blob existence
      description: |
        Check if a blob exists without retrieving it.
        Returns the same headers as GET but without the body.
      operationId: headBlob
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/digest'
      responses:
        '200':
          description: Blob exists
          headers:
            Content-Length:
              schema:
                type: integer
                description: Size of the blob in bytes
            Docker-Content-Digest:
              schema:
                type: string
                description: Digest of the blob
            Content-Type:
              schema:
                type: string
                example: application/octet-stream
        '307':
          description: Redirect to upload location
          headers:
            Location:
              schema:
                type: string
                description: URI to fetch the blob from
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    delete:
      tags:
        - Blobs
      summary: Delete blob
      description: Delete a blob identified by digest
      operationId: deleteBlob
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/digest'
      responses:
        '202':
          description: Blob accepted for deletion
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
  
  /{name}/blobs/uploads:
    post:
      tags:
        - Blobs
      summary: Initiate blob upload
      description: |
        Initiate a resumable blob upload. Returns an upload location
        to use for subsequent requests.
      operationId: initiateBlobUpload
      parameters:
        - $ref: '#/components/parameters/name'
        - name: Content-Length
          in: header
          description: Expected size of the blob
          required: false
          schema:
            type: integer
      responses:
        '202':
          description: Upload location provided
          headers:
            Location:
              schema:
                type: string
                description: Relative URL to use for upload
            Range:
              schema:
                type: string
                example: 0-0
                description: Current byte offset
            Docker-Upload-UUID:
              schema:
                type: string
                description: Upload UUID for tracking
        '401':
          $ref: '#/components/responses/Unauthorized'
    
    get:
      tags:
        - Blobs
      summary: Get blob upload status
      description: Retrieve status of an ongoing upload
      operationId: getBlobUploadStatus
      parameters:
        - $ref: '#/components/parameters/name'
      responses:
        '204':
          description: Upload in progress
          headers:
            Range:
              schema:
                type: string
                example: 0-1024
                description: Current byte offset
        '404':
          $ref: '#/components/responses/NotFound'
  
  /{name}/blobs/uploads/{uuid}:
    get:
      tags:
        - Blobs
      summary: Resume blob upload
      description: Resume an existing upload
      operationId: resumeBlobUpload
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/uuid'
      responses:
        '204':
          description: Upload resumed
          headers:
            Range:
              schema:
                type: string
                example: 0-1024
        '404':
          $ref: '#/components/responses/NotFound'
    
    patch:
      tags:
        - Blobs
      summary: Upload blob chunk
      description: Upload a chunk of blob data
      operationId: patchBlobUpload
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/uuid'
        - name: Content-Range
          in: header
          description: Range of bytes being uploaded
          required: false
          schema:
            type: string
            example: 0-1023
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Chunk accepted
          headers:
            Location:
              schema:
                type: string
                description: Upload location URL
            Range:
              schema:
                type: string
                example: 0-2047
        '416':
          description: Invalid range
        '400':
          $ref: '#/components/responses/BadRequest'
    
    put:
      tags:
        - Blobs
      summary: Complete blob upload
      description: Complete an upload with the final chunk
      operationId: completeBlobUpload
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/uuid'
        - name: digest
          in: query
          description: Digest of the complete blob
          required: true
          schema:
            type: string
            example: sha256:abc123...
      requestBody:
        required: false
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '201':
          description: Blob upload complete
          headers:
            Location:
              schema:
                type: string
                description: Location of the created blob
            Docker-Content-Digest:
              schema:
                type: string
                description: Digest of the uploaded blob
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    
    delete:
      tags:
        - Blobs
      summary: Cancel blob upload
      description: Cancel an in-progress upload
      operationId: cancelBlobUpload
      parameters:
        - $ref: '#/components/parameters/name'
        - $ref: '#/components/parameters/uuid'
      responses:
        '204':
          description: Upload cancelled
        '404':
          $ref: '#/components/responses/NotFound'
  
  # Tags
  /{name}/tags/list:
    get:
      tags:
        - Tags
      summary: List tags
      description: Retrieve all tags for a repository
      operationId: listTags
      parameters:
        - $ref: '#/components/parameters/name'
        - name: n
          in: query
          description: Limit the number of entries returned
          schema:
            type: integer
            minimum: 1
        - name: last
          in: query
          description: Result set will include values lexically after last
          schema:
            type: string
      responses:
        '200':
          description: Tag list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagsList'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  parameters:
    name:
      name: name
      in: path
      required: true
      description: Repository name
      schema:
        type: string
        example: library/ubuntu
    reference:
      name: reference
      in: path
      required: true
      description: Manifest reference (tag or digest)
      schema:
        type: string
        example: latest
    digest:
      name: digest
      in: path
      required: true
      description: Blob digest
      schema:
        type: string
        pattern: '^(sha256|sha512):[a-f0-9]+$'
        example: sha256:abc123...
    uuid:
      name: uuid
      in: path
      required: true
      description: Upload UUID
      schema:
        type: string
        format: uuid
  
  schemas:
    Manifest:
      type: object
      required:
        - schemaVersion
        - mediaType
        - config
        - layers
      properties:
        schemaVersion:
          type: integer
          description: Image manifest schema version
          example: 2
        config:
          $ref: '#/components/schemas/Descriptor'
          description: Configuration descriptor
        layers:
          type: array
          description: List of layer descriptors
          items:
            $ref: '#/components/schemas/Descriptor'
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Optional annotations
          example:
            org.opencontainers.image.created: '2021-01-01T00:00:00Z'
    
    DockerManifest:
      type: object
      required:
        - schemaVersion
        - mediaType
        - config
        - layers
      properties:
        schemaVersion:
          type: integer
          example: 2
        mediaType:
          type: string
          example: application/vnd.docker.distribution.manifest.v2+json
        config:
          $ref: '#/components/schemas/Descriptor'
        layers:
          type: array
          items:
            $ref: '#/components/schemas/Descriptor'
    
    Descriptor:
      type: object
      required:
        - mediaType
        - size
        - digest
      properties:
        mediaType:
          type: string
          description: Media type of the referenced content
          example: application/vnd.oci.image.layer.v1.tar+gzip
        size:
          type: integer
          description: Size of the content in bytes
          minimum: 0
          example: 123456
        digest:
          type: string
          description: Content digest
          pattern: '^(sha256|sha512):[a-f0-9]+$'
          example: sha256:abc123...
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Optional annotations
    
    TagsList:
      type: object
      properties:
        name:
          type: string
          description: Repository name
          example: library/ubuntu
        tags:
          type: array
          description: List of tags
          items:
            type: string
          example:
            - latest
            - 20.04
            - 18.04
  
  responses:
    NotFound:
      description: Requested resource was not found
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: MANIFEST_UNKNOWN
                    message:
                      type: string
                      example: manifest unknown
                    detail:
                      type: object
    
    Unauthorized:
      description: Authentication required
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: Bearer realm="https://auth.example.com/token",service="registry.example.com"
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: UNAUTHORIZED
                    message:
                      type: string
                      example: authentication required
    
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: object
                  properties:
                    code:
                      type: string
                      example: BLOB_UNKNOWN
                    message:
                      type: string
                      example: blob unknown
                    detail:
                      type: object

