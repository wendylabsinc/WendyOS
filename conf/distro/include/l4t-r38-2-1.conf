#
# L4T R38.2.1 Version Pinning Configuration
# This file pins all NVIDIA L4T packages to release 38.2.1 (JetPack 7.0)
# For NVIDIA Jetson AGX Thor (Tegra264) support
# Note: nvidia-kernel-oot will use 38.2.2+git from its git recipe
#

# L4T version string (format: major.minor.patch)
L4T_VERSION = "38.2.1"

# Corresponding BSP version used by meta-tegra
L4T_BSP_VERSION = "r38.2.1"

# BSP architecture for Thor (T264)
L4T_BSP_ARCH = "t264"

# CUDA version for L4T 38.2
# JetPack 7.0 (L4T 38.2) includes CUDA 13.0
CUDA_VERSION = "13.0"
CUDA_VERSION_DASHED = "13-0"

# cuDNN version for this release
CUDNN_VERSION = "9.12.0"

# TensorRT version for this release
TENSORRT_VERSION = "10.13.3"

# Pin specific L4T packages to r38.2.1
# These PREFERRED_VERSION settings ensure Yocto uses the correct versions
PREFERRED_VERSION_tegra-libraries = "38.2.1%"
PREFERRED_VERSION_tegra-libraries-multimedia = "38.2.1%"
PREFERRED_VERSION_tegra-libraries-cuda = "38.2.1%"
PREFERRED_VERSION_tegra-libraries-nvsci = "38.2.1%"

# CUDA toolkit pinning
PREFERRED_VERSION_cuda-toolkit = "13.0%"
PREFERRED_VERSION_cuda-cudart = "13.0%"
PREFERRED_VERSION_cuda-nvcc = "13.0%"

# cuDNN pinning
PREFERRED_VERSION_cudnn = "9.12%"

# TensorRT pinning
PREFERRED_VERSION_tensorrt-core = "10.13%"
PREFERRED_VERSION_tensorrt-plugins = "10.13%"

# NVIDIA container runtime
PREFERRED_VERSION_libnvidia-container = "1.16%"
PREFERRED_VERSION_nvidia-container-toolkit = "1.16%"

# Kernel version for L4T R38.2 (Noble/Ubuntu 24.04 base)
PREFERRED_VERSION_linux-noble-nvidia-tegra = "6.8%"

# Optional: Force specific git SHAs if needed for reproducibility
# L4T_BSP_SHA256 = "your-sha-here"
# L4T_KERNEL_SHA256 = "your-sha-here"

# Prevent automatic updates
# This ensures builds are reproducible and don't fetch newer versions
TEGRA_SKIP_VERSION_CHECK = "1"
