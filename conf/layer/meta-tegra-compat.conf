#
# meta-tegra Layer Compatibility Patch
#
# meta-tegra R38.2.x uses LAYERSERIES_COMPAT_tegra = "whinlatter"
# but "whinlatter" doesn't exist in Yocto yet (future 6.0 or 5.3)
#
# This file extends compatibility to support styhead (Yocto 5.1)
# allowing us to use L4T R38.2 with current Yocto releases
#

# Extend meta-tegra compatibility to include styhead
LAYERSERIES_COMPAT:tegra:append = " styhead"
