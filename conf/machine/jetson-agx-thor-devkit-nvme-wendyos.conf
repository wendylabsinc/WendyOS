#
# jetson-agx-thor-devkit-nvme-wendyos.conf
# NVMe boot configuration for NVIDIA Jetson AGX Thor Developer Kit
#
#@TYPE: Machine
#@NAME: Nvidia Jetson AGX Thor Developer Kit (NVMe Boot)
#@DESCRIPTION: Machine configuration for NVIDIA Jetson AGX Thor Developer Kit with NVMe boot
#
# Hardware: P3834-0008 module + P4071-0000 carrier board
# SoC: Tegra264 (T264) - 14-core ARMv9-A Neoverse-V3AE
# Storage: NVMe only (no internal eMMC)
# L4T: R38.2.x (JetPack 7.0)
# Yocto: 5.3 (whinlatter)
#

MACHINEOVERRIDES =. "jetson-agx-thor-devkit:"

# Require upstream base configuration
require conf/machine/jetson-agx-thor-devkit.conf

# Use prebuilt bootloader components to avoid complex build dependencies (meta-clang, etc)
PREFERRED_PROVIDER_hafnium = "hafnium-prebuilt"
PREFERRED_VERSION_hafnium = "38.2.1%"
PREFERRED_PROVIDER_edk2-nvidia-standalone-mm = "edk2-nvidia-standalone-mm-prebuilt"
USE_PREBUILT_OPTEE = "1"

# AB upgrades & bootloader
UBOOT_EXTLINUX = "1"
USE_REDUNDANT_FLASH_LAYOUT_DEFAULT = "1"

# UEFI boot (disable U-Boot)
MENDER_FEATURES_DISABLE:append = " mender-uboot"
MENDER_EFI_LOADER = ""

# UEFI Configuration
# Disable Secure Boot for development/testing (no signing keys configured)
# When "false": No key enrollment, Secure Boot disabled, unsigned capsules accepted
# Set to "true" for production after implementing proper signing infrastructure
TEGRA_UEFI_USE_SIGNED_FILES = "false"

# UEFI Capsule Update Support
# Controlled by WENDYOS_UPDATE_BOOTLOADER variable (default: disabled)
# When enabled, bootloader updates are delivered via UEFI capsule mechanism
TEGRA_UEFI_CAPSULE_UPDATE_ENABLE ?= "${@'true' if d.getVar('WENDYOS_UPDATE_BOOTLOADER') == '1' else 'false'}"

# NVMe Storage Configuration
# Thor only supports NVMe boot (no internal eMMC)
WENDYOS_FLASH_IMAGE_SIZE ??= "64GB"
MENDER_STORAGE_DEVICE_BASE = "/dev/nvme0n1p"
MENDER_BOOT_PART = "${MENDER_STORAGE_DEVICE_BASE}11"
MENDER_ROOTFS_PART_A = "${MENDER_STORAGE_DEVICE_BASE}1"
MENDER_ROOTFS_PART_B = "${MENDER_STORAGE_DEVICE_BASE}2"

# IMPORTANT: Use partition 17 for Mender data
# Partition 17 (mender_data, renamed from permanent_user_storage) is positioned
# AFTER APP_b and can expand to fill remaining disk space.
MENDER_DATA_PART_NUMBER = "17"
MENDER_DATA_PART = "${MENDER_STORAGE_DEVICE_BASE}${MENDER_DATA_PART_NUMBER}"

# Initial data partition size - will auto-expand on first boot via mender-grow-data.service
MENDER_DATA_PART_SIZE_MB = "512"

# Boot device
TNSPEC_BOOTDEV = "nvme0n1p1"

# T264 Partition Layout Templates
# Thor uses T264-specific partition layouts with QSPI + NVMe
PARTITION_LAYOUT_TEMPLATE_DEFAULT = "flash_l4t_t264_qspi.xml"
PARTITION_LAYOUT_TEMPLATE_DEFAULT_SUPPORTS_REDUNDANT = "1"
PARTITION_LAYOUT_EXTERNAL_DEFAULT = "flash_l4t_t264_nvme.xml"

# Image formats - moved to individual recipes to avoid global application
# IMAGE_FSTYPES set per-recipe to prevent non-Tegra images from inheriting tegraflash
# IMAGE_FSTYPES:tegra = "tegraflash mender dataimg"
IMAGE_FSTYPES:pn-tegra-minimal-initramfs:tegra = "${INITRAMFS_FSTYPES}"
IMAGE_FSTYPES:pn-tegra-initrd-flash-initramfs:tegra = "${TEGRA_INITRD_FLASH_INITRAMFS_FSTYPES}"

# Thor has no eMMC
EMMC_SIZE = "0"

# Boot control overlay for A/B boot priority management
# This device-tree overlay ensures UEFI bootloader respects Mender's A/B slot selection
# Note: Just the filename - image_types_tegra.bbclass will look for it in DEPLOY_DIR_IMAGE
TEGRA_BOOTCONTROL_OVERLAYS = "boot-priority.dtbo"

# Device Tree Blob location for tegraflash packaging
# DTB is staged to /usr/share/tegraflash (which gets staged to sysroot), not /boot/devicetree
# Override EXTERNAL_KERNEL_DEVICETREE to point to the staged location
EXTERNAL_KERNEL_DEVICETREE = "${RECIPE_SYSROOT}/usr/share/tegraflash"

# Plugin Manager overlays - skip dynamic overlay as it's not available yet
# TODO: Investigate if this overlay is needed for full hardware functionality
TEGRA_PLUGIN_MANAGER_OVERLAYS = ""
