#@TYPE: Machine
#@NAME: QEMU ARM64 WendyOS
#@DESCRIPTION: Machine configuration for running WendyOS on QEMU ARMv8

# Inherit base QEMU ARM64 configuration from poky
require conf/machine/qemuarm64.conf

# Note: MACHINEOVERRIDES inherited from qemu.inc includes "qemuall"
# Do NOT add "qemu:" here as it conflicts with the qemu recipe package name

# Image formats - no Tegra-specific formats
# Remove tegraflash, mender (for now), dataimg
# Keep ext4 for QEMU rootfs, tar.bz2 for SDK
IMAGE_FSTYPES = "ext4 tar.bz2"

# Explicitly remove Tegra-specific image types added by meta-mender-tegra
# tegra-mender-setup.bbclass (global class) unconditionally adds these
IMAGE_FSTYPES:remove = "tegraflash dataimg"
IMAGE_CLASSES:remove = "image_types_mender_tegra"

# Remove UEFI image types added by mender-full class (not needed for QEMU)
IMAGE_FSTYPES:remove = "uefiimg uefiimg.bmap uefiimg.bz2"

# Clear boot files for QEMU (no separate boot partition needed)
# This prevents "MENDER_BOOT_PART_SIZE_MB is set to zero" warning
IMAGE_BOOT_FILES = ""

# WendyOS feature flags for QEMU
# No USB gadget in QEMU (we'll use virtio-net renamed to usb0)
WENDYOS_USB_GADGET ?= "0"

# Mender configuration for QEMU
# meta-mender-tegra sets EXTRADEPS:tegra with Tegra-specific packages
# For QEMU, we need to explicitly set it to empty to avoid unresolved dependencies
EXTRADEPS = ""

# Mender is disabled for QEMU builds (see wendyos-image.bb)
# QEMU uses simple single-partition ext4 layout without Mender A/B partitions
# If you need to test Mender in QEMU, uncomment the following and modify wendyos-image.bb:
# MENDER_STORAGE_TOTAL_SIZE_MB = "32768"
# MENDER_DATA_PART_NUMBER = "3"
# MENDER_ROOTFS_PART_A_NUMBER = "1"
# MENDER_ROOTFS_PART_B_NUMBER = "2"

# No DeepStream (requires NVIDIA GPU)
WENDYOS_DEEPSTREAM ?= "0"

# No UEFI capsule updates in QEMU
WENDYOS_UPDATE_BOOTLOADER ?= "0"

# No EFI debug mode needed
WENDYOS_EFI_DEBUG ?= "0"

# QEMU-specific settings override
# Use 4GB RAM (matching typical Jetson Orin Nano config)
QB_MEM = "-m 4096"

# Use multiple CPUs for better performance
QB_SMP = "-smp 4"

# Network device configuration
# Using virtio-net-pci (will be renamed to usb0 via udev)
QB_TAP_OPT = "-netdev tap,id=net0,ifname=@TAP@,script=no,downscript=no"
QB_NETWORK_DEVICE = "-device virtio-net-pci,netdev=net0,mac=@MAC@"

# Kernel image type
KERNEL_IMAGETYPE = "Image"

# Serial console
SERIAL_CONSOLES = "115200;ttyAMA0"

# Machine features
MACHINE_FEATURES = "alsa bluetooth usbgadget usbhost vfat ext2 screen"

# Stable board identity written to /etc/wendyos/device-type
WENDYOS_BOARD_ID = "qemu-arm64"
