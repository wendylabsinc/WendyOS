MACHINEOVERRIDES =. "raspberrypi5-nvme:raspberrypi5:"
require conf/machine/raspberrypi5-wendyos.conf

# NVMe WKS layout (SD card base uses rpi-partuuid.wks)
WKS_FILE = "rpi-nvme-partuuid.wks"

# Enable PCIe port for non-HAT+ passive PCIe Mini -> M.2 adapter
RPI_EXTRA_CONFIG = "dtparam=pciex1\n"

# NVMe-specific packages
IMAGE_INSTALL:append = " rpi-eeprom-nvme-config"
