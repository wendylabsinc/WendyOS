# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
    ${TOPDIR}/../repos/meta-mender/meta-mender-core \
    ${TOPDIR}/../repos/meta-mender-community/meta-mender-tegra/meta-mender-tegra-common \
    ${TOPDIR}/../repos/meta-mender-community/meta-mender-tegra/meta-mender-tegra-jetpack7 \
    ${TOPDIR}/../repos/meta-openembedded/meta-networking \
    ${TOPDIR}/../repos/meta-openembedded/meta-oe \
    ${TOPDIR}/../repos/meta-openembedded/meta-python \
    ${TOPDIR}/../repos/meta-virtualization \
    ${TOPDIR}/../repos/meta-tegra \
    ${TOPDIR}/../repos/meta-tegra-community \
    ${TOPDIR}/../repos/openembedded-core/meta \
    ${TOPDIR}/../repos/meta-yocto/meta-poky \
    ${TOPDIR}/../repos/meta-yocto/meta-yocto-bsp \
    ${TOPDIR}/../%META-REPO% \
    "

# meta-multimedia temporarily removed - has UNPACKDIR compatibility issues with Yocto 5.3
# Audio support (pipewire/wireplumber) disabled until meta-openembedded whinlatter stabilizes

# Yocto 5.3 (whinlatter) uses new repository structure:
# - openembedded-core/meta (formerly poky/meta)
# - meta-yocto/meta-poky (formerly poky/meta-poky)
# - meta-yocto/meta-yocto-bsp (formerly poky/meta-yocto-bsp)
# - bitbake is now a separate repository
