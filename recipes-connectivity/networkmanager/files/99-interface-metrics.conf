# NetworkManager interface priority configuration
# Lower metric = higher priority
#
# usb0 (USB gadget) is the fallback route — it must have a higher metric than
# Ethernet and WiFi so that those interfaces are preferred as the default route
# when available. usb0 at metric 100 would override WiFi/eth as the default.
#
# Priority order (highest to lowest):
# 1. Ethernet (eth0/enp*) - Wired network, metric 100
# 2. WiFi (wlan0) - Wireless, metric 300
# 3. USB gadget network (usb0) - Fallback, metric 700

[connection-ethernet]
match-device=type:ethernet
ipv4.route-metric=100
ipv6.route-metric=100

[connection-wifi]
match-device=type:wifi
ipv4.route-metric=300
ipv6.route-metric=300

[connection-usb]
match-device=interface-name:usb*
ipv4.route-metric=700
ipv6.route-metric=700
